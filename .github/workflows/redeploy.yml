name: Redeploy Pages
on:
  workflow_dispatch:
  push:
permissions:
  id-token: write
  contents: read
  pages: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: https://raywu089457-cmd.github.io/mega-idle-web-pixel/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./
      - uses: actions/deploy-pages@v4
