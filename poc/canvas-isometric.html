<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>PoC A — Canvas 等角 2.5D(零依賴)</title>
<style>
  html,body{margin:0;height:100%;background:#12101a;color:#fff8dc;font-family:system-ui,sans-serif;overflow:hidden}
  #wrap{position:fixed;inset:0}
  canvas{display:block;width:100%;height:100%;image-rendering:pixelated}
  #hud{position:fixed;top:8px;left:8px;z-index:10;font-size:12px;line-height:1.5;
       background:rgba(28,20,40,.72);border:1px solid #5d4037;padding:8px 10px;border-radius:4px;max-width:60vw}
  #hud b{color:#f4d03f}
  #pick{position:fixed;bottom:10px;left:8px;z-index:10;font-size:14px;color:#f4d03f;
        background:rgba(28,20,40,.8);border:1px solid #5d4037;padding:6px 10px;border-radius:4px;min-height:1.2em}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="hud">
  <b>PoC A · 純 Canvas 2D 等角投影(零依賴)</b><br>
  滑鼠移動看建築高亮 · 點擊建築顯示名稱<br>
  小人 = 原遊戲程式像素畫,永遠面向相機(2.5D billboard)<br>
  <span id="clock"></span>
</div>
<div id="pick">點一棟建築試試</div>
<script>
// ─────────────────────────────────────────────────────────────
// PoC A:證明「零依賴」也能做出 2.5D。沿用真實 PLOT_COORDS / 職業配色 / 建築造型。
// 世界座標系沿用遊戲的 240(x) × 360(y) 邏輯場景;此處把 y 當作地面「深度」軸。
// ─────────────────────────────────────────────────────────────
const WORLD_W = 240, WORLD_H = 360;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// 真實資料(擷取自 src/scene.js)
const PLOT_COORDS = [
  {x:16,y:164},{x:96,y:132},{x:184,y:166},{x:62,y:188},{x:158,y:194},
  {x:22,y:252},{x:100,y:258},{x:178,y:252},{x:96,y:314},
];
const BUILDINGS = [
  {id:'tavern',   name:'酒館', fw:42,fd:30, h:44, wall:'#a9764b', roof:'#6d3f2a'},
  {id:'guild',    name:'公會', fw:50,fd:40, h:70, wall:'#c9b082', roof:'#46324a'},
  {id:'market',   name:'市集', fw:40,fd:30, h:36, wall:'#8b5a2b', roof:'#e74c3c'},
  {id:'restaurant',name:'餐廳',fw:26,fd:18, h:26, wall:'#a94f3c', roof:'#7a2f22'},
  {id:'drinkShop',name:'飲料', fw:22,fd:16, h:24, wall:'#3c6ea9', roof:'#274a70'},
  {id:'forge',    name:'鐵匠', fw:44,fd:30, h:42, wall:'#8f8f9d', roof:'#3c3c46'},
  {id:'alchemy',  name:'煉金', fw:40,fd:28, h:38, wall:'#9b7bb8', roof:'#4b3a63'},
  {id:'research', name:'研究', fw:40,fd:30, h:46, wall:'#7890c9', roof:'#2d3d63'},
  {id:'gate',     name:'獵場門',fw:48,fd:26, h:34, wall:'#4a4a55', roof:'#1b1026'},
].map((b,i)=>({...b, x:PLOT_COORDS[i].x + b.fw/2, y:PLOT_COORDS[i].y + b.fd/2}));

const CLASS_COLOR = {warrior:'#e74c3c',mage:'#9b59b6',rogue:'#2c3e50',archer:'#27ae60',priest:'#f1c40f'};
const CLASS_LIST = Object.keys(CLASS_COLOR);

// ── 等角投影 ────────────────────────────────────────────────
// screenX = (wx - wy) * ISO_X ; screenY = (wx + wy) * ISO_Y - wz * H_SCALE
const ISO_X = 1.15, ISO_Y = 0.60, H_SCALE = 0.92;
let SCALE = 1, ORX = 0, ORY = 0;

function computeView(){
  // 投影四個地面角,算出邊界後置中
  const corners = [[0,0],[WORLD_W,0],[WORLD_W,WORLD_H],[0,WORLD_H]]
    .map(([x,y])=>({sx:(x-y)*ISO_X, sy:(x+y)*ISO_Y}));
  const minX=Math.min(...corners.map(c=>c.sx)), maxX=Math.max(...corners.map(c=>c.sx));
  const minY=Math.min(...corners.map(c=>c.sy)), maxY=Math.max(...corners.map(c=>c.sy));
  const projW=maxX-minX, projH=(maxY-minY)+90; // +90 給建築高度留空間
  SCALE = Math.min(canvas.width/(projW+80), canvas.height/(projH+80));
  ORX = canvas.width/2 - ((minX+maxX)/2)*SCALE;
  ORY = canvas.height/2 - ((minY+maxY)/2)*SCALE - 20*SCALE;
}
function project(wx, wy, wz=0){
  return { x: ORX + (wx-wy)*ISO_X*SCALE, y: ORY + ((wx+wy)*ISO_Y - wz*H_SCALE)*SCALE };
}

// ── 演員(流浪獵人 + 野怪),沿用遊戲 wander 概念 ────────────
const anchors = BUILDINGS.map(b=>({x:b.x, y:b.y+ b.fd/2 + 8}));
function mkHero(){
  const cls = CLASS_LIST[Math.floor(Math.random()*CLASS_LIST.length)];
  return { type:'hero', cls, x:120+(Math.random()*40-20), y:346, tx:120, ty:346, spd:26+Math.random()*10, bob:Math.random()*6 };
}
function mkMob(){
  const kinds=[['slime','#5fbf5f'],['rat','#a08a6a'],['wolf','#8a8f7a'],['golem','#7d6b5d']];
  const [kind,color]=kinds[Math.floor(Math.random()*kinds.length)];
  return { type:'mob', kind, color, x:20+Math.random()*80, y:315+Math.random()*35, tx:0,ty:0, spd:12, bob:Math.random()*6, roam:()=>({x:20+Math.random()*80,y:312+Math.random()*40})};
}
const actors = [];
for(let i=0;i<7;i++) actors.push(mkHero());
for(let i=0;i<4;i++){ const m=mkMob(); const t=m.roam(); m.tx=t.x; m.ty=t.y; actors.push(m); }

function retarget(a){
  if(a.type==='hero'){ const an=anchors[Math.floor(Math.random()*anchors.length)]; a.tx=an.x+(Math.random()*12-6); a.ty=an.y+(Math.random()*8-4); a.wait=0.6+Math.random()*2.5; }
  else { const t=a.roam(); a.tx=t.x; a.ty=t.y; a.wait=1+Math.random()*2; }
}
function stepActor(a, dt){
  if(a.wait>0){ a.wait-=dt; if(a.wait<=0) return; }
  const dx=a.tx-a.x, dy=a.ty-a.y, d=Math.hypot(dx,dy);
  if(d<1.5){ if(a.wait===undefined||a.wait<=0) retarget(a); return; }
  const s=Math.min(d, a.spd*dt); a.x+=dx/d*s; a.y+=dy/d*s;
}

// ── 繪製 ────────────────────────────────────────────────────
function drawGround(day){
  // 大地菱形
  const g0=project(0,0), g1=project(WORLD_W,0), g2=project(WORLD_W,WORLD_H), g3=project(0,WORLD_H);
  ctx.beginPath(); ctx.moveTo(g0.x,g0.y); ctx.lineTo(g1.x,g1.y); ctx.lineTo(g2.x,g2.y); ctx.lineTo(g3.x,g3.y); ctx.closePath();
  const grass = mix([111,159,82],[32,53,31], 1-day);
  ctx.fillStyle = `rgb(${grass})`; ctx.fill();
  // 格線
  ctx.strokeStyle='rgba(0,0,0,0.10)'; ctx.lineWidth=1;
  for(let x=0;x<=WORLD_W;x+=40){ const a=project(x,0),b=project(x,WORLD_H); ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke(); }
  for(let y=0;y<=WORLD_H;y+=40){ const a=project(0,y),b=project(WORLD_W,y); ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke(); }
  // 主幹道
  ctx.fillStyle=`rgba(122,90,60,${0.35+day*0.25})`;
  quad(project(108,120),project(128,120),project(128,356),project(108,356));
}
function quad(a,b,c,d){ ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.lineTo(c.x,c.y);ctx.lineTo(d.x,d.y);ctx.closePath();ctx.fill(); }
function shade(hex,f){ const n=parseInt(hex.slice(1),16); const r=(n>>16)&255,g=(n>>8)&255,b=n&255; return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`; }

function drawBuilding(b, hot, day){
  const hw=b.fw/2, hd=b.fd/2, cx=b.x, cy=b.y, h=b.h;
  // 地面四角
  const A=[cx-hw,cy-hd],B=[cx+hw,cy-hd],C=[cx+hw,cy+hd],D=[cx-hw,cy+hd];
  const pB=project(...B), pC=project(...C), pD=project(...D);
  const tA=project(A[0],A[1],h),tB=project(B[0],B[1],h),tC=project(C[0],C[1],h),tD=project(D[0],D[1],h);
  const lit = 0.55+day*0.45, hi = hot?1.18:1;
  // 東面(+x)
  ctx.fillStyle=shade(b.wall, 0.72*lit*hi); quad(pB,pC,tC,tB);
  // 南面(+y,離相機最近)
  ctx.fillStyle=shade(b.wall, 0.90*lit*hi); quad(pD,pC,tC,tD);
  // 屋頂
  ctx.fillStyle=shade(b.roof, 1.0*lit*hi); quad(tA,tB,tC,tD);
  // 門(南面中央)
  const dr=project(cx, cy+hd, Math.min(16,h*0.4)); const db=project(cx,cy+hd,0);
  ctx.fillStyle='#1b1026'; ctx.fillRect(dr.x-3*SCALE, dr.y, 6*SCALE, (db.y-dr.y));
  if(hot){ ctx.strokeStyle='#f4d03f'; ctx.lineWidth=2; ctx.stroke(); }
}

function drawHero(a, t, day){
  const p=project(a.x,a.y,0); const s=SCALE*1.25;
  const bob=Math.round(Math.sin(t*6+a.bob));
  const x=p.x, y=p.y - bob*s;
  // 影子
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.beginPath(); ctx.ellipse(p.x, p.y+2*s, 5*s, 2.4*s, 0,0,7); ctx.fill();
  // 身體 5×6、頭 5×4(沿用遊戲比例)
  ctx.fillStyle=CLASS_COLOR[a.cls]; ctx.fillRect(x-2.5*s, y-6*s, 5*s, 6*s);
  ctx.fillStyle='#f0c8a0'; ctx.fillRect(x-2.5*s, y-10*s, 5*s, 4*s);
  ctx.fillStyle=CLASS_COLOR[a.cls]; ctx.fillRect(x-3*s, y-11*s, 6*s, 2*s);
  // 武器
  ctx.fillStyle='#dfe7ff'; ctx.fillRect(x+3*s, y-9*s, 1.2*s, 6*s);
  const nightTint=(1-day); if(nightTint>0.4){ ctx.fillStyle=`rgba(20,16,40,${(nightTint-0.4)*0.6})`; ctx.fillRect(x-3.2*s,y-11*s,6.4*s,11*s); }
}
function drawMob(a, t, day){
  const p=project(a.x,a.y,0); const s=SCALE*1.1;
  const bob=Math.round(Math.sin(t*5+a.bob));
  const x=p.x, y=p.y-bob*s;
  ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.beginPath(); ctx.ellipse(p.x,p.y+2*s,5*s,2.2*s,0,0,7); ctx.fill();
  ctx.fillStyle=a.color;
  if(a.kind==='slime'){ ctx.fillRect(x-3*s,y-2*s,7*s,5*s); ctx.fillRect(x-2*s,y-4*s,5*s,2*s); }
  else if(a.kind==='golem'){ ctx.fillRect(x-4*s,y-7*s,8*s,8*s); }
  else { ctx.fillRect(x-4*s,y-3*s,8*s,4*s); ctx.fillRect(x+2*s,y-5*s,4*s,3*s); }
  ctx.fillStyle='#1b1026'; ctx.fillRect(x-1*s,y-2*s,1*s,1*s); ctx.fillRect(x+1*s,y-2*s,1*s,1*s);
}

function mix(a,b,k){ return `${Math.round(a[0]+(b[0]-a[0])*k)},${Math.round(a[1]+(b[1]-a[1])*k)},${Math.round(a[2]+(b[2]-a[2])*k)}`; }

// ── 主迴圈 ──────────────────────────────────────────────────
let hotId=null, last=performance.now(), t0=performance.now();
function frame(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  const t=(now-t0)/1000;
  const day=(Math.sin(t/12)+1)/2; // 日夜循環

  ctx.fillStyle=`rgb(${mix([12,16,36],[92,154,214],day)})`;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  drawGround(day);

  for(const a of actors) stepActor(a, dt);

  // y-sort:把建築與演員一起依 (x+y) 排序 → 遠的先畫
  const draws=[];
  for(const b of BUILDINGS) draws.push({sort:b.x+b.y+b.fd/2, kind:'b', ref:b});
  for(const a of actors)    draws.push({sort:a.x+a.y, kind:a.type, ref:a});
  draws.sort((p,q)=>p.sort-q.sort);
  for(const d of draws){
    if(d.kind==='b') drawBuilding(d.ref, d.ref.id===hotId, day);
    else if(d.kind==='hero') drawHero(d.ref, t, day);
    else drawMob(d.ref, t, day);
  }

  document.getElementById('clock').textContent = day>0.5 ? `☀ 白天 ${(day*100|0)}%` : `🌙 夜晚 ${((1-day)*100|0)}%`;
  requestAnimationFrame(frame);
}

// ── 命中測試(逆投影近似:掃描建築,取最上層被點中的)────────
function pick(mx,my){
  let best=null, bestSort=-1e9;
  for(const b of BUILDINGS){
    const hw=b.fw/2, hd=b.fd/2;
    // 用「屋頂四角 + 南面」組成的多邊形做點測試
    const tA=project(b.x-hw,b.y-hd,b.h),tB=project(b.x+hw,b.y-hd,b.h),tC=project(b.x+hw,b.y+hd,b.h),tD=project(b.x-hw,b.y+hd,b.h);
    const pD=project(b.x-hw,b.y+hd,0), pC=project(b.x+hw,b.y+hd,0);
    const poly=[tA,tB,tC,pC,pD,tD];
    if(inPoly(mx,my,poly)){ const srt=b.x+b.y; if(srt>bestSort){bestSort=srt;best=b;} }
  }
  return best;
}
function inPoly(x,y,pts){ let c=false; for(let i=0,j=pts.length-1;i<pts.length;j=i++){ const xi=pts[i].x,yi=pts[i].y,xj=pts[j].x,yj=pts[j].y; if(((yi>y)!==(yj>y)) && (x<(xj-xi)*(y-yi)/(yj-yi)+xi)) c=!c; } return c; }

canvas.addEventListener('pointermove', e=>{ const r=canvas.getBoundingClientRect(); const b=pick((e.clientX-r.left)*canvas.width/r.width,(e.clientY-r.top)*canvas.height/r.height); hotId=b?b.id:null; canvas.style.cursor=b?'pointer':'default'; });
canvas.addEventListener('pointerdown', e=>{ const r=canvas.getBoundingClientRect(); const b=pick((e.clientX-r.left)*canvas.width/r.width,(e.clientY-r.top)*canvas.height/r.height); document.getElementById('pick').textContent = b?`🏠 你點了:${b.name}(${b.id}) — 真實遊戲此處會 openPanel('${b.id}')`:'（沒點到建築)'; });

function resize(){ const dpr=Math.min(2,window.devicePixelRatio||1); canvas.width=Math.round(innerWidth*dpr); canvas.height=Math.round(innerHeight*dpr); computeView(); }
addEventListener('resize', resize); resize();
requestAnimationFrame(frame);
</script>
</body>
</html>
