<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="description" content="王國傳說 — Idle Kingdom Builder">
<meta name="theme-color" content="#5d4037">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>王國傳說 — Idle Kingdom Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Serif+TC:wght@400;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --rich-soil: #5d4037;
  --warm-wood: #8b5a2b;
  --golden-wheat: #f4d03f;
  --hover-hl: #f7d856;
  --parchment: #fff8dc;
  --cream: #faf0e6;
  --light-tan: #d2b48c;
  --dark-tan: #8b7355;
  --burnt-orange: #d2691e;
  --charcoal: #2c2c2c;
  --gold: #f4d03f;
  --green: #27AE60;
  --red: #E74C3C;
  --blue: #3498DB;
  --purple: #9B59B6;
  --text: #3e2723;
  --text-dim: rgba(62,39,35,0.65);
  --text-faint: rgba(62,39,35,0.4);
  --card-bg: rgba(139,90,43,0.1);
  --card-border: rgba(93,64,55,0.3);
  --panel-h: 60px;
  --nav-h: 56px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Press Start 2P',monospace,'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',monospace;
  background:var(--rich-soil);
  color:var(--text);
  position:relative;overflow:hidden;
}
#game-wrap{
  position:relative;width:100%;max-width:480px;height:100vh;margin:0 auto;
  overflow:hidden;background:var(--cream);
}

:lang(zh-TW) .res-name, :lang(zh-CN) .res-name, :lang(zh) .res-name { font-size: 14px; }
/* Restore explicit pixel sizes for emoji/icon elements — blocks :lang inheritance */
.nav-ico    { font-size: 30px !important; }
.hero-portrait { font-size: unset; }
.res-ico    { font-size: unset; }
.mat-icon .ico { font-size: 18px !important; }
.building-ico { font-size: unset; }
.zone-ico   { font-size: unset; }
.shop-ico   { font-size: unset; }
.inv-ico    { font-size: unset; }
.castle-img { font-size: 144px !important; }
.hud-res .icon { font-size: 14px !important; }
.hud-center .ico { font-size: unset; }
.btn-icon   { font-size: unset; }
.mat-icon .amt { font-size: unset; }
.hud-res .val { font-size: unset; }

/* ── BACKGROUND ── */
.bg-layer{position:fixed;inset:0;z-index:0;background:linear-gradient(180deg,#d2b48c 0%,#c4a67c 40%,#a08060 100%);}
.bg-stars{display:none;}

/* ── FLOAT CANVAS ── */
#float-canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:200;}

/* ── HUD ── */
.hud{position:fixed;top:0;left:0;right:0;max-width:480px;height:var(--panel-h);margin:0 auto;z-index:100;background:var(--rich-soil);border-bottom:2px solid var(--charcoal);display:flex;align-items:center;padding:0 12px;gap:8px;box-shadow:2px 2px 0 var(--charcoal);}
.hud-left{display:flex;flex-direction:column;gap:2px;min-width:100px;}
.kingdom-name{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--golden-wheat);letter-spacing:1px;text-shadow:2px 2px 0 var(--charcoal);}
.hud-resources{display:flex;gap:8px;}
.hud-res{display:flex;align-items:center;gap:3px;font-size:20px;color:var(--text-dim);}
.hud-res .icon{font-size:14px;}
.hud-res .val{color:var(--gold);font-weight:600;font-family:'Press Start 2P',monospace;font-size:10px;text-shadow:1px 1px 0 var(--charcoal);}
.hud-center{flex:1;display:flex;justify-content:center;align-items:center;gap:6px;}
.mat-icon{display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;padding:4px 6px;}
.mat-icon .ico{font-size:18px;}
.mat-icon .amt{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--gold);text-shadow:1px 1px 0 var(--charcoal);}
.hud-right{display:flex;align-items:center;gap:6px;}
.btn-icon{width:36px;height:36px;background:var(--warm-wood);border:2px solid var(--charcoal);color:var(--parchment);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:2px 2px 0 var(--charcoal);}

/* ── MAIN CANVAS ── */
.main-canvas{position:fixed;top:var(--panel-h);left:0;right:0;max-width:480px;bottom:var(--nav-h);margin:0 auto;z-index:1;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.castle-scene{position:relative;display:flex;flex-direction:column;align-items:center;gap:4px;}
.castle-img{font-size:144px;filter:drop-shadow(2px 2px 0 var(--charcoal));animation:float 4s ease-in-out infinite;user-select:none;transition:transform 0.15s;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.castle-label{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--rich-soil);letter-spacing:2px;text-shadow:2px 2px 0 var(--light-tan);}
.castle-sub{font-size:15px;color:var(--text-dim);}
.click-hint{font-family:'Press Start 2P',monospace;font-size:7px;color:rgba(93,64,55,0.4);letter-spacing:1px;margin-top:4px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.4;}50%{opacity:0.9;}}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;height:var(--nav-h);padding-bottom:max(env(safe-area-inset-bottom),12px);margin:0 auto;z-index:100;background:var(--rich-soil);border-top:2px solid var(--charcoal);display:flex;box-shadow:-2px -2px 0 var(--charcoal);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:transparent;color:var(--dark-tan);font-family:'Lora',serif;font-size:11px;padding:4px 0;position:relative;min-height:44px;}
.nav-btn .nav-ico{font-size:30px;transition:transform 0.2s;}
.nav-btn:hover,.nav-btn.active{color:var(--golden-wheat);}
.nav-btn:hover .nav-ico,.nav-btn.active .nav-ico{transform:scale(1.15);}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--golden-wheat);}

/* ── PANELS ── */
.panel{position:fixed;left:0;right:0;top:var(--panel-h);max-width:480px;margin:0 auto;z-index:50;background:var(--cream);border-top:2px solid var(--charcoal);max-height:0;overflow:hidden;transition:max-height 0.35s cubic-bezier(0.4,0,0.2,1);box-shadow:-2px -2px 0 var(--charcoal);}
.panel.open{max-height:calc(100vh - var(--panel-h) - var(--nav-h) - max(env(safe-area-inset-bottom), 80px));}
.panel-inner{height:calc(100vh - var(--panel-h) - var(--nav-h) - max(env(safe-area-inset-bottom), 80px) - 2px);overflow-y:auto;padding:0 12px 12px;scrollbar-width:thin;scrollbar-color:rgba(93,64,55,0.3) transparent;}
.panel-inner::-webkit-scrollbar{width:3px;}.panel-inner::-webkit-scrollbar-thumb{background:rgba(93,64,55,0.3);}
.panel-header{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:12px 0 10px;background:var(--cream);}
#panel-res .panel-title,
#panel-res .res-name,
#panel-res .res-val,
#panel-res .res-max { font-size: 14px; }
.btn-close{background:var(--warm-wood);border:2px solid var(--charcoal);color:var(--parchment);cursor:pointer;padding:4px 8px;box-shadow:2px 2px 0 var(--charcoal);font-size:12px !important;}

/* ── TABS ── */
.tabs{display:flex;gap:4px;margin-bottom:10px;border-bottom:2px solid var(--dark-tan);padding-bottom:0;}
.tab-btn{padding:12px 24px;font-family:'Press Start 2P',monospace;font-size:15px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-faint);cursor:pointer;margin-bottom:-2px;}
.tab-btn.active{color:var(--rich-soil);border-bottom-color:var(--rich-soil);}
.tab-btn:hover{color:var(--rich-soil);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* ── RESOURCE CARDS ── */
.res-grid{display:flex;flex-direction:column;gap:8px;}
.res-card{background:var(--card-bg);border:2px solid var(--card-border);padding:10px 12px;display:flex;flex-direction:column;gap:6px;}
.res-top{display:flex;align-items:center;justify-content:space-between;}
.res-info{display:flex;align-items:center;gap:8px;}
.res-ico{font-size:30px;}
.res-name{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-dim);}
.res-val{font-family:'Press Start 2P',monospace;font-size:14px;color:var(--rich-soil);}
.res-max{font-size:16px;color:var(--text-faint);}
.progress-bar{height:8px;background:rgba(139,90,43,0.2);overflow:hidden;}
.progress-fill{height:100%;background:var(--rich-soil);transition:width 0.5s;}
.progress-fill.warn{background:var(--burnt-orange);}
.progress-fill.crit{background:var(--red);}
.rate{font-size:7px;color:var(--green);margin-left:auto;}

/* ── HERO CARDS ── */
/* Hero panel Chinese text */
#panel-hero .hero-slot-info,
#panel-hero .hero-name,
#panel-hero .hero-class,
#panel-hero .stat,
#panel-hero .hero-badge { font-size: 14px; }

#panel-build .building-name,
#panel-build .building-level,
#panel-build .building-effect,
#panel-build .max-badge,
#panel-build .building-desc,
#panel-build .cost-item { font-size: 14px; }

/* Map panel Chinese text */
#panel-map .section-label,
#panel-map .explore-name,
#panel-map .explore-hero,
#panel-map .explore-pct,
#panel-map .zone-name,
#panel-map .zone-rec,
#panel-map .zone-status { font-size: 14px; }

/* Shop panel Chinese text */
#panel-shop .shop-name,
#panel-shop .shop-stock,
#panel-shop .inv-title,
#panel-shop .inv-name,
#panel-shop .inv-qty { font-size: 14px; }
.hero-portrait{width:88px;height:88px;background:rgba(139,90,43,0.15);border:2px solid var(--warm-wood);display:flex;align-items:center;justify-content:center;font-size:39px;flex-shrink:0;}
.hero-info{flex:1;}
.badge-idle{background:rgba(244,208,63,0.2);color:var(--rich-soil);border:2px solid var(--rich-soil);}
.badge-exploring{background:rgba(52,152,219,0.2);color:var(--blue);border:2px solid var(--blue);}
.badge-resting{background:rgba(155,89,182,0.2);color:var(--purple);border:2px solid var(--purple);}
.badge-wandering{background:rgba(155,89,182,0.1);color:var(--purple);border:2px solid var(--purple);}
.hero-actions{display:flex;gap:6px;}
.hero-equip{display:flex;gap:8px;margin-top:4px;}
.equip-slot{font-size:11px;padding:2px 6px;background:rgba(139,90,43,0.1);border:1px solid var(--warm-wood);color:var(--text-dim);}
.hero-inv{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
.inv-item{font-size:14px;}
.inv-more{font-size:10px;color:var(--text-faint);align-self:center;}

/* ── BUTTONS ── */
.btn{padding:14px 28px;font-family:'Press Start 2P',monospace;font-size:15px;cursor:pointer;border:2px solid var(--charcoal);display:inline-flex;align-items:center;gap:8px;box-shadow:2px 2px 0 var(--charcoal);}
.btn-gold{background:var(--golden-wheat);border-color:var(--charcoal);color:var(--rich-soil);}
.btn-gold:hover{background:var(--hover-hl);}
.btn-outline{background:transparent;border-color:var(--warm-wood);color:var(--rich-soil);}
.btn-outline:hover{background:var(--card-bg);}
.btn-blue{background:rgba(52,152,219,0.15);border-color:var(--blue);color:var(--blue);}
.btn-purple{background:rgba(155,89,182,0.15);border-color:var(--purple);color:var(--purple);}
.btn-red{background:rgba(231,76,60,0.15);border-color:var(--red);color:var(--red);}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn-sm{padding:10px 20px;font-size:15px;}

/* ── BUILDINGS ── */
.building-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.building-card{background:var(--card-bg);border:2px solid var(--card-border);padding:10px;display:flex;flex-direction:column;gap:6px;}
.building-header{display:flex;align-items:center;justify-content:space-between;}
.building-name{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--rich-soil);}
.building-level{font-family:'Press Start 2P',monospace;font-size:7px;padding:4px 12px;background:rgba(244,208,63,0.1);color:var(--rich-soil);border:2px solid var(--rich-soil);}
.building-ico{font-size:42px;text-align:center;margin:4px 0;}
.building-desc{font-family:'Lora',serif;font-size:13px;color:var(--text-faint);line-height:1.4;}
.building-effect{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--green);}
.building-cost{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.cost-item{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text-dim);}
.max-badge{text-align:center;padding:10px;background:rgba(244,208,63,0.06);color:var(--dark-tan);font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:1px;}

/* ── MAP / ZONES ── */
.active-explore{margin-bottom:12px;}
.section-label{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-faint);letter-spacing:1px;margin-bottom:12px;}
.explore-item{background:var(--card-bg);border:2px solid rgba(52,152,219,0.3);padding:16px 20px;margin-bottom:12px;}
.explore-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.explore-name{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--blue);}
.explore-hero{font-size:13px;color:var(--text-faint);}
.explore-pct{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--text-dim);}
.zone-list{display:flex;flex-direction:column;gap:12px;}
.zone-card{background:var(--card-bg);border:2px solid var(--card-border);padding:20px 24px;display:flex;align-items:center;gap:20px;}
.zone-card.locked{opacity:0.45;filter:grayscale(0.5);}
.zone-card.cleared{border-color:rgba(244,208,63,0.4);}
.zone-card.unlocked{border-color:rgba(39,174,96,0.35);}
.zone-ico{font-size:36px;flex-shrink:0;}
.zone-info{flex:1;}
.zone-name{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text);}
.zone-stars{font-size:30px;color:var(--golden-wheat);}
.zone-rec{font-size:13px;color:var(--text-faint);}
.zone-status{font-size:10px;flex-shrink:0;}

/* ── SHOP ── */
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.shop-card{background:var(--card-bg);border:2px solid var(--card-border);padding:10px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
.shop-ico{font-size:48px;}
.shop-name{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--rich-soil);}
.shop-stock{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-faint);}
.inventory{margin-top:4px;}
.inv-title{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-dim);margin-bottom:16px;border-bottom:2px solid var(--dark-tan);padding-bottom:12px;}
.inv-list{display:flex;flex-direction:column;gap:8px;}
.inv-item{display:flex;align-items:center;gap:16px;background:var(--card-bg);padding:14px 20px;border:2px solid var(--card-border);}
.inv-ico{font-size:12px;}
.inv-name{flex:1;font-size:15px;color:var(--text-dim);}
.inv-qty{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--rich-soil);}

/* ── REPORT SUB TABS ── */
.report-sub-tabs{display:flex;gap:4px;margin-bottom:8px;}
.report-sub-btn{padding:10px 20px;font-family:'Press Start 2P',monospace;font-size:15px;background:var(--card-bg);border:2px solid var(--card-border);color:var(--text-faint);cursor:pointer;}
.report-sub-btn.active{background:rgba(244,208,63,0.2);border-color:var(--rich-soil);color:var(--rich-soil);}
.clear-btn-row{display:flex;justify-content:flex-end;margin-bottom:8px;}
.report-entry{background:var(--card-bg);margin-bottom:6px;overflow:hidden;border:2px solid var(--card-border);}
.report-head{display:flex;align-items:center;gap:16px;padding:10px 20px;cursor:pointer;}
.report-result{font-family:'Press Start 2P',monospace;font-size:7px;}
.report-info{flex:1;}
.report-title{font-size:15px;color:var(--text);}
.report-time{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-faint);}
.report-expand{font-size:15px;color:var(--text-faint);transition:transform 0.2s;}
.report-expand.open{transform:rotate(180deg);}
.report-body{padding:0 16px;max-height:0;overflow:hidden;transition:max-height 0.3s ease,border-top-width 0.2s,padding 0.3s;border-top:0px solid var(--dark-tan);font-size:12px;color:var(--text-dim);}
.report-body.open{padding:12px 16px;max-height:500px;border-top-width:1px;}
.combat-log{padding:20px;display:flex;flex-direction:column;gap:6px;}
.log-line{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-dim);padding:4px 0;border-bottom:1px solid rgba(139,90,43,0.1);}
.log-line:last-child{border-bottom:none;}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--cream);border:2px solid var(--charcoal);padding:20px;max-width:320px;width:90%;box-shadow:4px 4px 0 var(--charcoal);transform:translateY(20px);transition:transform 0.25s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-title{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--rich-soil);margin-bottom:14px;text-align:center;}
.modal-body{display:flex;flex-direction:column;gap:10px;}
.offline-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(139,90,43,0.1);}
.offline-label{font-size:15px;color:var(--text-dim);display:flex;align-items:center;gap:5px;}
.offline-val{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--rich-soil);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;}
.setting-label{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-dim);}
.slider{-webkit-appearance:none;width:100px;height:3px;background:rgba(139,90,43,0.2);outline:none;}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--golden-wheat);cursor:pointer;border:2px solid var(--charcoal);}
.toggle{width:36px;height:18px;background:rgba(139,90,43,0.2);position:relative;cursor:pointer;}
.toggle.on{background:var(--green);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;background:var(--parchment);transition:transform 0.2s;}
.toggle.on::after{transform:translateX(18px);}

/* ── DISPATCH MODAL ── */
.dispatch-zone-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.dispatch-zone{background:var(--card-bg);border:2px solid var(--card-border);padding:8px;cursor:pointer;}
.dispatch-zone.locked{opacity:0.4;cursor:not-allowed;}
.dispatch-zone.selected{border-color:var(--rich-soil);background:rgba(244,208,63,0.1);}
.dispatch-zone:not(.locked):hover{border-color:var(--warm-wood);}
.dz-name{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text);}
.dz-stars{font-size:24px;color:var(--golden-wheat);}

/* ── TOAST ── */
#toast-container{position:fixed;top:70px;right:12px;max-width:480px;z-index:400;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.toast{padding:8px 14px;font-family:'Press Start 2P',monospace;font-size:7px;box-shadow:2px 2px 0 var(--charcoal);animation:toastIn 0.3s ease forwards;opacity:0;}
.toast.show{opacity:1;}
.toast-success{background:var(--green);color:#fff;border:2px solid var(--green);}
.toast-error{background:var(--red);color:#fff;border:2px solid var(--red);}
.toast-info{background:var(--blue);color:#fff;border:2px solid var(--blue);}
@keyframes toastIn{from{transform:translateX(20px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes toastOut{from{opacity:1;}to{opacity:0;transform:translateX(20px);}}

/* ── DIVIDER ── */
.divider{height:2px;background:var(--dark-tan);margin:8px 0;}

@media(max-width:400px){
  .building-grid{grid-template-columns:1fr;}
  .shop-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="bg-stars"></div>
<canvas id="float-canvas"></canvas>

<!-- ── HUD ── -->

function getBuildingCost(buildingId, targetLevel) {
  const building = BUILDINGS[buildingId];
  if (!building) return null;
  const multiplier = Math.pow(building.costMultiplier, targetLevel - 1);
  const cost = {};
  for (const [resourceId, baseAmount] of Object.entries(building.baseCost)) {
    cost[resourceId] = Math.floor(baseAmount * multiplier);
  }
  return cost;
}

// ═══════════════════════════════════════════════════════════════════
// RESOURCE SYSTEM
// ═══════════════════════════════════════════════════════════════════
let resources = {};
let resourceListeners = [];
function ResourceSystem_init(savedState) {
  if (savedState && savedState.resources) {
    resources = {};
    for (const [key, config] of Object.entries(RESOURCES)) {
      resources[key] = { value: savedState.resources[key] ?? config.initial, capacity: config.capacity };
    }
  } else {
    resources = {};
    for (const [key, config] of Object.entries(RESOURCES)) {
      resources[key] = { value: config.initial, capacity: config.capacity };
    }
  }
}
function ResourceSystem_add(resourceId, amount) {
  if (!resources[resourceId]) return 0;
  const prev = resources[resourceId].value;
  const newValue = Math.min(prev + amount, RESOURCES[resourceId].capacity);
  const actualAdded = newValue - prev;
  resources[resourceId].value = newValue;
  resourceListeners.forEach(l => { try { l('add', { resourceId, amount: actualAdded, total: newValue }); } catch(e) {} });
  return actualAdded;
}
function ResourceSystem_subtract(resourceId, amount) {
  if (!resources[resourceId]) return false;
  const prev = resources[resourceId].value;
  if (prev < amount) return false;
  resources[resourceId].value = prev - amount;
  resourceListeners.forEach(l => { try { l('subtract', { resourceId, amount, total: resources[resourceId].value }); } catch(e) {} });
  return true;
}
function ResourceSystem_get(resourceId) { return resources[resourceId]?.value ?? 0; }
function ResourceSystem_getAll() { const r = {}; for (const [k, v] of Object.entries(resources)) r[k] = v.value; return r; }
function ResourceSystem_canAfford(cost) { for (const [id, amt] of Object.entries(cost)) if (ResourceSystem_get(id) < amt) return false; return true; }
function ResourceSystem_spend(cost) { if (!ResourceSystem_canAfford(cost)) return false; for (const [id, amt] of Object.entries(cost)) ResourceSystem_subtract(id, amt); return true; }
function ResourceSystem_getCapacity(resourceId) { return resources[resourceId]?.capacity ?? 0; }
function ResourceSystem_getFillPercent(resourceId) { const s = resources[resourceId]; if (!s || s.capacity === 0) return 0; return (s.value / s.capacity) * 100; }
function ResourceSystem_produceMaterials(monumentLevel = 1) {
  const results = {};
  for (const mat of MATERIAL_TYPES) results[mat] = ResourceSystem_add(mat, (Math.floor(Math.random() * 3) + 1) * monumentLevel);
  return results;
}
function ResourceSystem_addListener(cb) { resourceListeners.push(cb); }
function ResourceSystem_getConfig(rid) { return RESOURCES[rid] ?? null; }

// ═══════════════════════════════════════════════════════════════════
// BUILDING SYSTEM
// ═══════════════════════════════════════════════════════════════════
let buildingStates = {};
function BuildingSystem_init(savedState) {
  const saved = savedState?.buildings || {};
  for (const [id, def] of Object.entries({ monument: { level: 1 }, tavern: { level: 1 }, weaponShop: { level: 1 }, potionShop: { level: 1 }, armorShop: { level: 1 } })) {
    buildingStates[id] = { level: saved[id]?.level ?? def.level };
  }
}
function BuildingSystem_getLevel(id) { return buildingStates[id]?.level ?? 1; }
function BuildingSystem_getAll() {
  const r = {};
  for (const [id, state] of Object.entries(buildingStates)) {
    const def = BUILDINGS[id];
    if (!def) continue;
    r[id] = { id, name: def.name, description: def.description, effect: def.effect, level: state.level, maxLevel: def.maxLevel, cost: getBuildingCost(id, state.level + 1), canUpgrade: state.level < def.maxLevel, icon: def.icon, effectText: def.effectText };
  }
  return r;
}
function BuildingSystem_upgrade(id) {
  const def = BUILDINGS[id]; if (!def) return false;
  const cur = BuildingSystem_getLevel(id); if (cur >= def.maxLevel) return false;
  const cost = getBuildingCost(id, cur + 1); if (!ResourceSystem_spend(cost)) return false;
  buildingStates[id].level += 1; return true;
}
function BuildingSystem_getWanderingSpawnInterval() { return Math.max(2, 12 - (BuildingSystem_getLevel('tavern') * 2)); }
function BuildingSystem_getMaxWanderingHeroes() { return BuildingSystem_getWanderingHeroSlots().max; }
function BuildingSystem_getWanderingHeroSlots(currentCount = 0) { const t = BuildingSystem_getLevel('tavern'); return { current: currentCount, max: 10 + (t - 1) * 3 }; }
function BuildingSystem_getTerritoryHeroSlots(currentCount = 0) { const t = BuildingSystem_getLevel('tavern'); return { current: currentCount, max: 7 + (t - 1) * 2 }; }

function resolveCombat(hero) {

      if (!MapSystem_isZoneCleared(zone.id)) mapProgress.clearedZones.push(zone.id);
      const nextZ = ZONES.find(z => z.id === zone.id + 1);
      if (nextZ && !MapSystem_isZoneUnlocked(nextZ.id)) { mapProgress.unlockedZones.push(nextZ.id); mapProgress.currentZone = nextZ.id; }
      completed.push({ heroId: exp.heroId, zoneId: zone.id, zoneName: zone.name, rewards: res });
    } else {
      exp.progress = hero.explorationProgress || 0;
    }
  }
  return completed;
}
function MapSystem_addListener(cb) { mapListeners.push(cb); }

// OFFLINE SYSTEM
// ═══════════════════════════════════════════════════════════════════
let lastOnlineTimestamp = null;
let isOffline = false;
const MAX_OFFLINE = 8 * 3600;
const OFFLINE_EFF = 0.5;
function OfflineSystem_init(savedState) { lastOnlineTimestamp = savedState?.lastOnline || Date.now(); }
function OfflineSystem_markOffline() { lastOnlineTimestamp = Date.now(); isOffline = true; }
function OfflineSystem_markOnline() {
  if (!isOffline) return null;
  const away = Math.floor((Date.now() - lastOnlineTimestamp) / 1000);
  if (away < 60) { isOffline = false; return null; }
  const summary = OfflineSystem_calculateOfflineProgress(lastOnlineTimestamp, Date.now());
  isOffline = false; return summary;
}
function OfflineSystem_calculateOfflineProgress(lastOnline, returnTime) {
  const total = Math.floor((returnTime - lastOnline) / 1000);
  const capped = Math.min(total, MAX_OFFLINE);
  const matP = {};
  for (const mat of MATERIAL_TYPES) { const v = 0.8 + Math.random() * 0.4; const p = Math.floor(2 * capped * v * OFFLINE_EFF); matP[mat] = p; ResourceSystem_add(mat, p); }
  const gP = Math.floor(50 * (capped / 60) * OFFLINE_EFF); ResourceSystem_add('gold', gP);
  const mS = Math.floor(Math.random() * 3); if (mS > 0) ResourceSystem_add('magicStones', mS);
  return { totalSeconds: total, cappedSeconds: capped, isCapped: total > MAX_OFFLINE, materialsProduced: matP, goldProduced: gP, magicStonesProduced: mS };
}

const territoryCombats = {};  // { [heroId_zoneId]: { hero, zone, enemyHp, enemyAtk, enemyDef, enemyName, heroHp, round, log, goldReward, magicStoneChance } }

async function doReset() {
  if (!confirm('確定要重新開始嗎？所有進度將會消失！')) return;
  // Clear localStorage FIRST to ensure no race with auto-save
  localStorage.removeItem('kingdomBuilderSave');
  // Write fresh default state
  const defaultState = {
    version: 1,
    lastOnline: Date.now(),
    resources: { gold: 500, magicStones: 0, fruitPoor: 0, waterDirty: 0, woodRotten: 0, ironRusty: 0, herbLow: 0 },
    heroes: [],
    buildings: { monument: { level: 1 }, tavern: { level: 1 }, weaponShop: { level: 1 }, potionShop: { level: 1 }, armorShop: { level: 1 } },
    mapProgress: { currentZone: 1, unlockedZones: [1], clearedZones: [] },
    shopInventory: {},
    shopLevel: 1,
    wanderingHeroes: [],
    battleReports: [],
    tickCount: 0,
    potionShopAutoProduce: true,
  };
  localStorage.setItem('kingdomBuilderSave', JSON.stringify(defaultState));
  // CRITICAL: Clear gameState and combat tracking so saveGame() becomes a no-op during the 500ms window
  gameState = null;
  Object.keys(wanderingCombats).forEach(k => delete wanderingCombats[k]);
  Object.keys(territoryCombats).forEach(k => delete territoryCombats[k]);
  // Also clear IndexedDB for consistency
  try {
    await SaveManager.delete();
  } catch(e) {}
  // Wait 500ms to ensure localStorage write completes before reload
  setTimeout(() => { location.reload(); }, 500);
}

function saveGame() {
  if (!gameState) return;
  gameState.lastOnline = Date.now();
  gameState.resources = ResourceSystem_getAll();
  gameState.heroes = territoryHeroes;
  gameState.wanderingHeroes = wanderingHeroes;
  gameState.buildings = {};
  for (const [id, state] of Object.entries(buildingStates)) gameState.buildings[id] = { level: state.level };
  gameState.mapProgress = mapProgress;
  gameState.shopInventory = shopInventory;
  gameState.shopLevel = shopLevel;
  gameState.nextWanderingSpawnIn = nextWanderingSpawnIn;
  gameState.battleReports = battleReports;
  localStorage.setItem('kingdomBuilderSave', JSON.stringify(gameState));
}

function loadGame() {
  const saved = localStorage.getItem('kingdomBuilderSave');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      gameState = parsed;
      return parsed;
    } catch(e) {
      gameState = getDefaultGameState();
      return gameState;
    }
  }
  gameState = getDefaultGameState();
  return gameState;
}

// FLOATING NUMBERS (Canvas)
// ═══════════════════════════════════════════════════════════════════
const floatCanvas = document.getElementById('float-canvas');
const floatCtx = floatCanvas.getContext('2d');
let floats = [];
function resizeFloatCanvas() { floatCanvas.width = window.innerWidth; floatCanvas.height = window.innerHeight; }
window.addEventListener('resize', resizeFloatCanvas); resizeFloatCanvas();
function spawnFloat(text, fromCenter) {
  const wrap = document.getElementById('game-wrap');
  const rect = wrap.getBoundingClientRect();
  const x = fromCenter
    ? rect.left + rect.width / 2 + (Math.random() - 0.5) * 60
    : rect.left + 40 + Math.random() * (rect.width - 80);
  const y = floatCanvas.height - 120;
  floats.push({ x, y, text, alpha: 1, vy: -1.2 - Math.random() * 0.8, size: fromCenter ? 14 : 12 });
}
function rafLoop() {
  const wrap = document.getElementById('game-wrap');
  const rect = wrap.getBoundingClientRect();
  floatCtx.clearRect(0, 0, floatCanvas.width, floatCanvas.height);
  floatCtx.save();
  floatCtx.translate(rect.left, 0);
  floats = floats.filter(f => f.alpha > 0);
  for (const f of floats) {
    f.y += f.vy; f.alpha -= 0.016;
    floatCtx.globalAlpha = Math.max(0, f.alpha);
    floatCtx.font = `bold ${f.size}px 'Press Start 2P', monospace`;
    floatCtx.fillStyle = '#5d4037';
    floatCtx.textAlign = 'center';
    floatCtx.fillText(f.text, f.x - rect.left, f.y);
  }
  floatCtx.globalAlpha = 1;
  floatCtx.restore();
  requestAnimationFrame(rafLoop);
}
rafLoop();

  const entry = headEl.closest('.report-entry');

    e.querySelector('.report-expand').classList.remove('open');
    e.querySelector('.report-head').classList.remove('open');
  });
  expandedReports.clear();
  // If it wasn't open, expand only this one
  if (!isOpen) {
    expandedReports.add(reportId);

    expand.classList.add('open');
    headEl.classList.add('open');
  }
}

function getTimeAgo(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return diff + ' 秒前';
  if (diff < 3600) return Math.floor(diff / 60) + ' 分前';
  if (diff < 86400) return Math.floor(diff / 3600) + ' 小時前';
  return Math.floor(diff / 86400) + ' 天前';
}

          <div class="explore-hero">英雄：${h.name}</div>
          <div class="explore-pct">${pct}%</div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,#1a5276,var(--blue))"></div></div>
      </div>`;
    }).join('');
  } else {
    activeDiv.innerHTML = '';
  }

  // Zone list
  zoneList.innerHTML = zones.map(zone => {
    const unlocked = prog.unlockedZones.includes(zone.id);
    const cleared = prog.clearedZones.includes(zone.id);
    const stars = '★'.repeat(zone.difficulty) + '☆'.repeat(5 - zone.difficulty);
    let cls = 'zone-card';
    if (!unlocked) cls += ' locked';
    else if (cleared) cls += ' cleared';
    else cls += ' unlocked';

    let btn = '';
    if (!unlocked) {
      btn = `<button class="btn btn-outline btn-sm" disabled>🔒 鎖定</button>`;
    } else if (cleared) {
      btn = `<button class="btn btn-outline btn-sm" disabled>✓ 已通關</button>`;
    } else {
      btn = `<button class="btn btn-gold btn-sm" onclick="showToast('從英雄面板派遣英雄探索！','info')">探索</button>`;
    }

    return `<div class="${cls}">
      <div class="zone-ico">${zone.icon}</div>
      <div class="zone-info">
        <div class="zone-name">${zone.name}</div>
        <div class="zone-stars">${stars}</div>
        <div class="zone-rec">推薦等級 Lv.${zone.recommendedLevel}+</div>
      </div>
      ${btn}
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════════
// RENDER: SHOP
// ═══════════════════════════════════════════════════════════════════
function renderShopPanel() {
  const grid = document.getElementById('shop-grid');
  const invList = document.getElementById('inv-list');
  const items = ShopSystem_getItems();
  const inv = ShopSystem_getInventory();

  grid.innerHTML = items.map(item => {
    const costHtml = Object.entries(item.cost).map(([rid, amt]) => `<div class="cost-item">${RESOURCES[rid]?.icon || ''} ${fmtFull(amt)}</div>`).join('');
    const canCraft = ResourceSystem_canAfford(item.cost);
    return `<div class="shop-card">
      <div class="shop-ico">${item.icon}</div>
      <div class="shop-name">${item.name}</div>
      <div class="shop-stock">庫存: ${inv[item.id] || 0}</div>
      <div class="building-cost" style="justify-content:center">${costHtml}</div>
      <button class="btn btn-gold btn-sm" ${canCraft ? '' : 'disabled'} onclick="craftItem('${item.id}')">製作 ${item.price}g</button>
    </div>`;
  }).join('');

  const invItems = Object.entries(inv).filter(([, q]) => q > 0);
  if (invItems.length === 0) {
    invList.innerHTML = `<div style="text-align:center;padding:12px;color:var(--text-faint);font-size:15px;font-style:italic;">暫無物品</div>`;
  } else {
    invList.innerHTML = invItems.map(([iid, qty]) => {
      const it = ITEMS[iid];
      return `<div class="inv-item"><div class="inv-ico">${it?.icon || '📦'}</div><div class="inv-name">${it?.name || iid}</div><div class="inv-qty">×${qty}</div></div>`;
    }).join('');
  }
}

// ═══════════════════════════════════════════════════════════════════
// DISPATCH MODAL
// ═══════════════════════════════════════════════════════════════════
function openDispatchModal(heroId) {
  dispatchHeroId = heroId;
  const hero = HeroSystem_getTerritoryHero(heroId);
  if (!hero) return;
  document.getElementById('dispatch-hero-name').textContent = '英雄：' + hero.name;
  const prog = MapSystem_getProgress();
  const zones = MapSystem_getZones();
  document.getElementById('dispatch-zone-grid').innerHTML = zones.map(z => {
    const unlocked = prog.unlockedZones.includes(z.id);
    const stars = '★'.repeat(z.difficulty) + '☆'.repeat(5 - z.difficulty);
    return `<div class="dispatch-zone ${unlocked ? '' : 'locked'}" data-zone="${z.id}" onclick="selectDispatchZone(${z.id},${unlocked})">
      <div class="dz-name">${z.icon} ${z.name}</div>
      <div class="dz-stars">${stars}${unlocked ? '' : ' 🔒'}</div>
    </div>`;
  }).join('');
  dispatchZoneId = null;
  document.getElementById('modal-dispatch').classList.add('open');
}
function selectDispatchZone(zoneId, unlocked) {
  if (!unlocked) { dispatchZoneId = null; showToast('該區域未解鎖', 'error'); return; }
  dispatchZoneId = zoneId;
  document.querySelectorAll('.dispatch-zone').forEach(z => z.classList.remove('selected'));
  document.querySelector(`.dispatch-zone[data-zone="${zoneId}"]`)?.classList.add('selected');
}
function closeDispatch() { document.getElementById('modal-dispatch').classList.remove('open'); dispatchHeroId = null; dispatchZoneId = null; }
function doDispatch() {
  if (!dispatchHeroId || !dispatchZoneId) { showToast('請選擇探索地點', 'error'); return; }
  const zone = ZONES.find(z => z.id === dispatchZoneId);
  if (!zone) return;
  const ok = MapSystem_startExploration(dispatchHeroId, dispatchZoneId);
  if (ok) {
    showToast(`${territoryHeroes.find(h=>h.id===dispatchHeroId)?.name || '英雄'} 出征！前往 ${zone.name}`, 'success');
    closeDispatch();
    renderMapPanel();
    if (activePanel === 'hero') renderHeroesTab('hero-territory');
  } else {
    showToast('無法派遣，請確認英雄狀態', 'error');
  }
}

// ═══════════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════════
function trainHero(heroId) {
  const hero = HeroSystem_getTerritoryHero(heroId);
  if (!hero) return;
  const cost = hero.level * 150;
  if (!ResourceSystem_spend({ gold: cost })) { showToast('金幣不足！', 'error'); return; }
  HeroSystem_trainHero(heroId, { gold: cost });
  showToast(`${hero.name} 訓練成功！🎉`, 'success');
  renderHeroesTab('hero-territory');
}
function recruitHero(heroId) {
  const hero = wanderingHeroes.find(h => h.id === heroId);
  if (!hero) return;
  const cost = HeroSystem_getRecruitCost(heroId);
  if (!HeroSystem_recruitWanderingHero(heroId)) {
    if (territoryHeroes.length >= BuildingSystem_getTerritoryHeroSlots(territoryHeroes.length).max) {
      showToast('英雄欄位已滿！', 'error');
    } else {
      showToast('金幣不足！', 'error');
    }
    return;
  }
  showToast(`${hero.name} 加入了您的王國！🎉`, 'success');
  renderHeroesTab('hero-wander');
  renderHeroesTab('hero-territory');
}
function banishHero(heroId) {
  const hero = territoryHeroes.find(h => h.id === heroId);
  if (!hero) return;
  const idx = territoryHeroes.findIndex(h => h.id === heroId);
  territoryHeroes.splice(idx, 1);
  showToast(`${hero.name} 已被驅逐。`, 'info');
  renderHeroesTab('hero-territory');
}
function upgradeBuilding(id) {
  const ok = BuildingSystem_upgrade(id);
  if (!ok) { showToast('升級失敗！', 'error'); return; }
  const b = BUILDINGS[id];
  showToast(`${b?.name || '建築'} 升級成功！`, 'success');
  renderBuildingPanel();
}
function craftItem(id) {
  const ok = ShopSystem_craftItem(id);
  if (!ok) { showToast('材料不足！', 'error'); return; }
  const it = ITEMS[id];
  showToast(`${it?.name || '物品'} 製作成功！`, 'success');
  renderShopPanel();
}

// ═══════════════════════════════════════════════════════════════════
// SETTINGS MODAL
// ═══════════════════════════════════════════════════════════════════
document.getElementById('btn-settings').onclick = () => document.getElementById('modal-settings').classList.add('open');
function closeSettings() { document.getElementById('modal-settings').classList.remove('open'); }

// ═══════════════════════════════════════════════════════════════════
// CASTLE CLICK
// ═══════════════════════════════════════════════════════════════════
// Castle click disabled

// ═══════════════════════════════════════════════════════════════════
// OFFLINE COLLECT
// ═══════════════════════════════════════════════════════════════════
function collectOffline() {
  if (!pendingOfflineSummary) return;
  const s = pendingOfflineSummary;
  // Resources already added by OfflineSystem_calculateOfflineProgress() during OfflineSystem_markOnline() in init()
  // Only spawn floating numbers for visual feedback
  const entries = Object.entries(s.materialsProduced);
  for (let i = 0; i < entries.length; i++) {
    spawnFloat(RESOURCES[entries[i][0]]?.icon + '+' + entries[i][1], true);
  }
  if (s.goldProduced > 0) spawnFloat('🪙+' + s.goldProduced, true);
  pendingOfflineSummary = null;
  document.getElementById('modal-welcome').classList.remove('open');
  showToast('離線收益已收取！', 'success');
  updateHUD();
}

// ═══════════════════════════════════════════════════════════════════
// HUD UPDATE
// ═══════════════════════════════════════════════════════════════════
function updateHUD() {
  const g = ResourceSystem_get('gold');
  const m = ResourceSystem_get('magicStones');
  document.getElementById('hud-gold').textContent = fmtFull(g);
  document.getElementById('hud-magic').textContent = fmtFull(m);
  for (const mat of MATERIAL_TYPES) {
    const el = document.getElementById('hc-' + mat.replace('Poor','').replace('Dirty','').replace('Rotten','').replace('Rusty','').replace('Low',''));
    if (el) el.textContent = fmt(ResourceSystem_get(mat));
  }
}
function updateHUDMats() {
  const matIds = ['fruit', 'water', 'wood', 'iron', 'herb'];
  matIds.forEach((m, i) => {
    const el = document.getElementById('hc-' + m);
    if (el) el.textContent = fmt(ResourceSystem_get(MATERIAL_TYPES[i]));
  });
}

// ═══════════════════════════════════════════════════════════════════
// MAIN TICK LOOP
// ═══════════════════════════════════════════════════════════════════
function gameTick() {
  const mLv = BuildingSystem_getLevel('monument');
  ResourceSystem_produceMaterials(mLv);
  HeroSystem_processWanderingTick();
  MapSystem_processExplorations();
  HeroSystem_processRestingTick();
  ShopSystem_processAutoProduction();
  updateHUD();
  updateHUDMats();
  // Always refresh open panels every tick so data is always live
  if (activePanel === 'res') renderResourcesPanel();
  if (activePanel === 'hero') renderHeroesPanel();
  if (activePanel === 'build') renderBuildingPanel();
  if (activePanel === 'map') renderMapPanel();
  if (activePanel === 'shop') renderShopPanel();
  saveGame();
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
function init() {
  const saved = loadGame();
  if (saved.battleReports) battleReports = saved.battleReports;
  ResourceSystem_init(saved);
  BuildingSystem_init(saved);
  HeroSystem_init(saved);
  ShopSystem_init(saved);
  MapSystem_init(saved);
  OfflineSystem_init(saved);

  if (saved.heroes.length === 0) {
    const starter = createTerritoryHero('warrior', 'Sir Aldric', 1);
    HeroSystem_addTerritoryHero(starter);
  }

  updateHUD();

  // Check offline
  const offline = OfflineSystem_markOnline();
  if (offline && offline.cappedSeconds > 60) {
    pendingOfflineSummary = offline;
    const body = document.getElementById('modal-welcome-body');
    const hours = Math.floor(offline.cappedSeconds / 3600);
    const mins = Math.floor((offline.cappedSeconds % 3600) / 60);
    body.innerHTML = `
      <div style="text-align:center;font-size:15px;color:var(--text-faint);margin-bottom:4px;">您離開了 <span style="color:var(--gold)">${hours} 小時 ${mins} 分</span></div>
      <div class="offline-item"><div class="offline-label">🪙 金幣</div><div class="offline-val">+${fmtFull(offline.goldProduced)}</div></div>
      ${Object.entries(offline.materialsProduced).map(([mat, amt]) => `<div class="offline-item"><div class="offline-label">${RESOURCES[mat]?.icon || ''} ${RESOURCES[mat]?.name || mat}</div><div class="offline-val">+${fmtFull(amt)}</div></div>`).join('')}
      ${offline.magicStonesProduced > 0 ? `<div class="offline-item"><div class="offline-label">💎 魔法石</div><div class="offline-val">+${offline.magicStonesProduced}</div></div>` : ''}
    `;
    document.getElementById('modal-welcome').classList.add('open');
  }

  setInterval(gameTick, 1000);

  // Auto-save every 30s
  setInterval(saveGame, 10000);

  // Visibility handling
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      OfflineSystem_markOffline();
      saveGame();
    }
  });
}

init();
</script>
</div>
</body>
