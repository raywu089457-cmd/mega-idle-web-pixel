<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="description" content="獵魔村物語 — 像素風閒置獵魔村建設遊戲">
<meta name="theme-color" content="#5d4037">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.json">
<title>獵魔村物語 — Hunter Village Tycoon</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Serif+TC:wght@400;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --rich-soil: #5d4037;
  --warm-wood: #8b5a2b;
  --golden-wheat: #f4d03f;
  --hover-hl: #f7d856;
  --parchment: #fff8dc;
  --cream: #faf0e6;
  --light-tan: #d2b48c;
  --dark-tan: #8b7355;
  --burnt-orange: #d2691e;
  --charcoal: #2c2c2c;
  --gold: #f4d03f;
  --green: #27AE60;
  --red: #E74C3C;
  --blue: #3498DB;
  --purple: #9B59B6;
  --text: #3e2723;
  --text-dim: rgba(62,39,35,0.65);
  --text-faint: rgba(62,39,35,0.4);
  --card-bg: rgba(139,90,43,0.1);
  --card-border: rgba(93,64,55,0.3);
  --panel-h: 60px;
  --nav-h: 56px;
  --rar-common: #8d8d8d;
  --rar-rare: #3498db;
  --rar-epic: #9b59b6;
  --rar-legend: #d4a017;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Press Start 2P',monospace,'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',monospace;
  background:var(--rich-soil);
  color:var(--text);
  position:relative;overflow:hidden;
}
#game-wrap{
  position:relative;width:100%;max-width:480px;height:100vh;margin:0 auto;
  overflow:hidden;background:var(--cream);
}

:lang(zh-TW) .res-name, :lang(zh-CN) .res-name, :lang(zh) .res-name { font-size: 14px; }
/* Restore explicit pixel sizes for emoji/icon elements — blocks :lang inheritance */
.nav-ico    { font-size: 28px !important; }
.hero-portrait { font-size: unset; }
.res-ico    { font-size: unset; }
.mat-icon .ico { font-size: 18px !important; }
.building-ico { font-size: unset; }
.zone-ico   { font-size: unset; }
.shop-ico   { font-size: unset; }
.inv-ico    { font-size: unset; }
.hud-res .icon { font-size: 14px !important; }
.hud-center .ico { font-size: unset; }
.btn-icon   { font-size: unset; }
.mat-icon .amt { font-size: unset; }
.hud-res .val { font-size: unset; }

/* ── BACKGROUND ── */
.bg-layer{position:fixed;inset:0;z-index:0;background:linear-gradient(180deg,#d2b48c 0%,#c4a67c 40%,#a08060 100%);}

/* ── FLOAT CANVAS (floating numbers / particles / ripples) ── */
#float-canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:200;}

/* ── HUD ── */
.hud{position:fixed;top:0;left:0;right:0;max-width:480px;height:var(--panel-h);margin:0 auto;z-index:100;background:var(--rich-soil);border-bottom:2px solid var(--charcoal);display:flex;align-items:center;padding:0 12px;gap:8px;box-shadow:2px 2px 0 var(--charcoal);}
.hud-left{display:flex;flex-direction:column;gap:2px;min-width:100px;}
.kingdom-name{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--golden-wheat);letter-spacing:1px;text-shadow:2px 2px 0 var(--charcoal);}
.hud-resources{display:flex;gap:8px;}
.hud-res{display:flex;align-items:center;gap:3px;font-size:20px;color:var(--text-dim);}
.hud-res .icon{font-size:14px;}
.hud-res .val{color:var(--gold);font-weight:600;font-family:'Press Start 2P',monospace;font-size:10px;text-shadow:1px 1px 0 var(--charcoal);}
.hud-center{flex:1;display:flex;justify-content:center;align-items:center;gap:6px;}
.mat-icon{display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 6px;}
.mat-icon .ico{font-size:18px;}
.mat-icon .amt{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--gold);text-shadow:1px 1px 0 var(--charcoal);}
.hud-right{display:flex;align-items:center;gap:6px;}
.btn-icon{width:36px;height:36px;background:var(--warm-wood);border:2px solid var(--charcoal);color:var(--parchment);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:2px 2px 0 var(--charcoal);}
.btn-icon:active{transform:translate(2px,2px);box-shadow:0 0 0 var(--charcoal);}

/* ── MAIN SCENE ── */
.main-canvas{position:fixed;top:var(--panel-h);left:0;right:0;max-width:480px;bottom:var(--nav-h);margin:0 auto;z-index:1;overflow:hidden;}
#scene-canvas{position:absolute;inset:0;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;cursor:pointer;touch-action:manipulation;}
.scene-overlay{position:absolute;left:0;right:0;bottom:10px;display:flex;flex-direction:column;align-items:center;gap:2px;pointer-events:none;}
.castle-label{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--parchment);letter-spacing:2px;text-shadow:2px 2px 0 var(--charcoal);}
.castle-sub{font-size:13px;color:var(--parchment);text-shadow:1px 1px 0 var(--charcoal);}
.click-hint{font-family:'Press Start 2P',monospace;font-size:7px;color:rgba(255,248,220,0.85);letter-spacing:1px;margin-top:2px;text-shadow:1px 1px 0 var(--charcoal);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.45;}50%{opacity:1;}}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;height:var(--nav-h);padding-bottom:max(env(safe-area-inset-bottom),0px);margin:0 auto;z-index:100;background:var(--rich-soil);border-top:2px solid var(--charcoal);display:flex;box-shadow:-2px -2px 0 var(--charcoal);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:transparent;color:var(--dark-tan);font-family:'Lora',serif;font-size:11px;padding:4px 0;position:relative;min-height:44px;}
.nav-btn .nav-ico{font-size:28px;transition:transform 0.15s;}
.nav-btn:hover,.nav-btn.active{color:var(--golden-wheat);}
.nav-btn:active .nav-ico{transform:scale(0.9);}
.nav-btn.active .nav-ico{transform:scale(1.12);}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--golden-wheat);}
.nav-btn .nav-badge{position:absolute;top:4px;right:calc(50% - 20px);min-width:14px;height:14px;padding:0 3px;background:var(--red);color:#fff;font-family:'Press Start 2P',monospace;font-size:8px;line-height:14px;text-align:center;border:1px solid var(--charcoal);}

/* ── PANELS ── */
.panel{position:fixed;left:0;right:0;top:var(--panel-h);max-width:480px;margin:0 auto;z-index:50;background:var(--cream);border-top:2px solid var(--charcoal);max-height:0;overflow:hidden;transition:max-height 0.35s cubic-bezier(0.4,0,0.2,1);box-shadow:-2px -2px 0 var(--charcoal);display:flex;flex-direction:column;}
.panel.open{max-height:calc(100vh - var(--panel-h) - var(--nav-h) - max(env(safe-area-inset-bottom), 0px));}
.panel-inner{flex:1;overflow-y:auto;display:flex;flex-direction:column;padding:0 12px 12px;-webkit-overflow-scrolling:touch;}
.panel-header{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:12px 0 10px;background:var(--cream);}
.panel-title{font-size:14px;color:var(--rich-soil);}
.btn-close{background:var(--warm-wood);border:2px solid var(--charcoal);color:var(--parchment);cursor:pointer;padding:4px 8px;box-shadow:2px 2px 0 var(--charcoal);font-size:12px !important;}
.btn-close:active{transform:translate(2px,2px);box-shadow:none;}
.hero-tab-bar{display:flex;gap:4px;padding:8px 12px 8px;border-top:2px solid var(--dark-tan);flex-shrink:0;}
#panel-res .panel-title, #panel-res .res-name, #panel-res .res-val, #panel-res .res-max { font-size: 14px; }
#panel-hero .hero-slot-info,#panel-hero .hero-name,#panel-hero .hero-class,#panel-hero .stat,#panel-hero .stat-hp-bar,#panel-hero .stat-hp-bar span,#panel-hero .hp-text,#panel-hero .stat-xp-bar,#panel-hero .stat-xp-bar span,#panel-hero .xp-text,#panel-hero .hero-badge { font-size: 14px; }
#panel-build .building-name,#panel-build .building-level,#panel-build .building-effect,#panel-build .max-badge,#panel-build .building-desc,#panel-build .cost-item { font-size: 14px; }
#panel-map .section-label,#panel-map .explore-name,#panel-map .explore-hero,#panel-map .explore-pct,#panel-map .zone-name,#panel-map .zone-rec,#panel-map .zone-status { font-size: 14px; }
#panel-shop .shop-name,#panel-shop .shop-stock,#panel-shop .inv-title,#panel-shop .inv-name,#panel-shop .inv-qty { font-size: 14px; }

/* ── TABS ── */
.tab-content{display:none;}
.tab-content.active{display:flex;flex-direction:column;}

/* ── RESOURCE CARDS ── */
.res-grid{display:flex;flex-direction:column;gap:8px;}
.res-card{background:var(--card-bg);border:2px solid var(--card-border);padding:10px 12px;display:flex;flex-direction:column;gap:6px;}
.res-top{display:flex;align-items:center;justify-content:space-between;}
.res-info{display:flex;align-items:center;gap:8px;}
.res-ico{font-size:30px;}
.res-name{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-dim);}
.res-val{font-family:'Press Start 2P',monospace;font-size:14px;color:var(--rich-soil);}
.res-max{font-size:16px;color:var(--text-faint);}
.progress-bar{height:8px;background:rgba(139,90,43,0.2);overflow:hidden;}
.progress-fill{height:100%;background:var(--rich-soil);transition:width 0.5s;}
.progress-fill.warn{background:var(--burnt-orange);}
.progress-fill.crit{background:var(--red);}
.rate{font-size:9px;color:var(--green);margin-left:auto;font-family:'Press Start 2P',monospace;}
.rate.neg{color:var(--text-faint);}
.bonus-line{font-size:12px;color:var(--purple);margin-top:2px;}

/* ── HERO CARDS ── */
.hero-card{background:var(--card-bg);border:2px solid var(--card-border);padding:12px;display:flex;flex-direction:column;gap:8px;margin-bottom:8px;}
.hero-top{display:flex;gap:12px;align-items:flex-start;}
.hero-stats{display:flex;flex-direction:column;gap:4px;margin-top:4px;}
.stat-hp-bar{display:flex;align-items:center;gap:6px;}
.hp-bar{flex:1;height:8px;background:rgba(139,90,43,0.2);border:2px solid var(--warm-wood);overflow:hidden;}
.hp-fill{height:100%;background:var(--red);transition:width 0.3s;}
.hp-fill.high{background:var(--green);}
.hp-fill.med{background:var(--burnt-orange);}
.hp-text{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-dim);min-width:60px;text-align:right;}
.stat-xp-bar{display:flex;align-items:center;gap:6px;}
.xp-bar{flex:1;height:8px;background:rgba(139,90,43,0.2);border:2px solid var(--warm-wood);overflow:hidden;}
.xp-fill{height:100%;background:var(--blue);transition:width 0.3s;}
.xp-text{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-dim);min-width:60px;text-align:right;}
.stat{font-size:13px;color:var(--text-dim);}
.stat .eq-bonus{color:var(--green);font-size:12px;}
.wallet-display{font-size:14px;color:#b8860b;margin-top:2px;font-family:'Press Start 2P',monospace;}
.wallet-display span{color:var(--rich-soil);}
.hero-portrait{width:88px;height:88px;background:rgba(139,90,43,0.15);border:2px solid var(--warm-wood);display:flex;align-items:center;justify-content:center;font-size:39px;flex-shrink:0;}
.hero-info{flex:1;min-width:0;}
.hero-name{font-size:15px;font-weight:bold;color:var(--text);}
.hero-class{font-size:13px;color:var(--text-dim);}
.hero-badge{font-size:11px;padding:2px 8px;flex-shrink:0;}
.badge-idle{background:rgba(244,208,63,0.2);color:var(--rich-soil);border:2px solid var(--rich-soil);}
.badge-exploring{background:rgba(52,152,219,0.2);color:var(--blue);border:2px solid var(--blue);}
.badge-resting{background:rgba(155,89,182,0.2);color:var(--purple);border:2px solid var(--purple);}
.badge-wandering{background:rgba(155,89,182,0.1);color:var(--purple);border:2px solid var(--purple);}
.hero-actions{display:flex;gap:6px;flex-wrap:wrap;}
.hero-equip{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;}
.equip-slot{font-size:11px;padding:2px 6px;background:rgba(139,90,43,0.1);border:1px solid var(--warm-wood);color:var(--text-dim);cursor:pointer;}
.equip-slot:hover{background:rgba(244,208,63,0.2);}
.inv-btn-slot{font-size:11px;padding:2px 6px;background:rgba(139,90,43,0.1);border:1px solid var(--warm-wood);color:var(--text-dim);cursor:pointer;display:inline-block;margin-top:4px;}
.empty-state{text-align:center;padding:20px;color:var(--text-faint);font-size:15px;font-style:italic;}

/* rarity */
.rar-common{border-color:var(--rar-common) !important;}
.rar-rare{border-color:var(--rar-rare) !important;}
.rar-epic{border-color:var(--rar-epic) !important;}
.rar-legendary{border-color:var(--rar-legend) !important;}
.rar-txt-common{color:var(--rar-common);}
.rar-txt-rare{color:var(--rar-rare);}
.rar-txt-epic{color:var(--rar-epic);}
.rar-txt-legendary{color:var(--rar-legend);}

/* ── BUTTONS ── */
.btn{padding:14px 28px;font-family:'Press Start 2P',monospace;font-size:15px;cursor:pointer;border:2px solid var(--charcoal);display:inline-flex;align-items:center;gap:8px;box-shadow:2px 2px 0 var(--charcoal);transition:transform 0.05s;}
.btn:active{transform:translate(2px,2px);box-shadow:0 0 0 var(--charcoal);}
.btn-gold{background:var(--golden-wheat);border-color:var(--charcoal);color:var(--rich-soil);}
.btn-gold:hover{background:var(--hover-hl);}
.btn-outline{background:transparent;border-color:var(--warm-wood);color:var(--rich-soil);}
.btn-outline:hover{background:var(--card-bg);}
.btn-blue{background:rgba(52,152,219,0.15);border-color:var(--blue);color:var(--blue);}
.btn-purple{background:rgba(155,89,182,0.15);border-color:var(--purple);color:var(--purple);}
.btn-red{background:rgba(231,76,60,0.15);border-color:var(--red);color:var(--red);}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn:disabled:active{transform:none;box-shadow:2px 2px 0 var(--charcoal);}
.btn-sm{padding:10px 20px;font-size:15px;}

/* ── BUILDINGS ── */
.building-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.building-card{background:var(--card-bg);border:2px solid var(--card-border);padding:10px;display:flex;flex-direction:column;gap:6px;}
.building-card.unbuilt{opacity:0.8;border-style:dashed;}
.building-header{display:flex;align-items:center;justify-content:space-between;}
.building-name{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--rich-soil);}
.building-level{font-family:'Press Start 2P',monospace;font-size:7px;padding:4px 12px;background:rgba(244,208,63,0.1);color:var(--rich-soil);border:2px solid var(--rich-soil);}
.building-ico{font-size:42px;text-align:center;margin:4px 0;}
.building-desc{font-family:'Lora',serif;font-size:13px;color:var(--text-faint);line-height:1.4;}
.building-effect{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--green);}
.building-cost{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.cost-item{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text-dim);}
.max-badge{text-align:center;padding:10px;background:rgba(244,208,63,0.06);color:var(--dark-tan);font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:1px;}
.building-stock{font-size:12px;color:var(--text-dim);text-align:center;}

/* ── MAP / ZONES ── */
.active-explore{margin-bottom:12px;}
.section-label{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-faint);letter-spacing:1px;margin-bottom:12px;}
.explore-item{background:var(--card-bg);border:2px solid rgba(52,152,219,0.3);padding:16px 20px;margin-bottom:12px;}
.explore-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:6px;flex-wrap:wrap;}
.explore-name{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--blue);}
.explore-hero{font-size:13px;color:var(--text-faint);}
.explore-pct{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--text-dim);}
.zone-list{display:flex;flex-direction:column;gap:12px;}
.zone-card{background:var(--card-bg);border:2px solid var(--card-border);padding:14px 16px;}
.zone-card.locked{opacity:0.45;filter:grayscale(0.5);}
.zone-card.cleared{border-color:rgba(244,208,63,0.5);}
.zone-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.zone-ico{font-size:24px;}
.zone-name{font-size:13px;font-weight:bold;color:var(--text);}
.zone-rec{font-size:12px;color:var(--text-faint);margin-left:auto;}
.diff-row{display:flex;gap:6px;flex-wrap:wrap;}
.diff-btn{position:relative;}
.diff-clear{position:absolute;top:-6px;right:-6px;width:14px;height:14px;background:var(--green);color:#fff;font-size:9px;line-height:14px;text-align:center;border:1px solid var(--charcoal);border-radius:0;}

/* ── SHOP ── */
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.shop-card{background:var(--card-bg);border:2px solid var(--card-border);padding:10px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
.shop-card.locked-item{opacity:0.55;}
.shop-ico{font-size:44px;}
.shop-name{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--rich-soil);}
.shop-stats{font-size:11px;color:var(--green);}
.shop-stock{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-faint);}
.shop-req{font-size:11px;color:var(--red);}
.inventory{margin-top:4px;}
.inv-title{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-dim);margin-bottom:16px;border-bottom:2px solid var(--dark-tan);padding-bottom:12px;}
.inv-list{display:flex;flex-direction:column;gap:8px;}
.inv-item{display:flex;align-items:center;gap:16px;background:var(--card-bg);padding:14px 20px;border:2px solid var(--card-border);}
.inv-ico{font-size:16px;}
.inv-name{flex:1;font-size:15px;color:var(--text-dim);}
.inv-qty{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--rich-soil);}

/* ── ACHIEVEMENTS / PRESTIGE ── */
.ach-card{background:var(--card-bg);border:2px solid var(--card-border);padding:12px;display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
.ach-card.special{border-color:var(--golden-wheat);background:rgba(244,208,63,0.08);}
.ach-head{display:flex;align-items:center;gap:10px;}
.ach-ico{font-size:26px;}
.ach-name{font-size:14px;font-weight:bold;color:var(--text);}
.ach-desc{font-size:12px;color:var(--text-faint);font-family:'Lora',serif;}
.ach-bonus{font-size:12px;color:var(--purple);}
.ach-state{font-size:11px;margin-left:auto;flex-shrink:0;padding:2px 8px;border:2px solid var(--card-border);color:var(--text-faint);}
.ach-state.done{border-color:var(--green);color:var(--green);background:rgba(39,174,96,0.08);}

/* ── REPORTS ── */
.report-sub-tabs{display:flex;gap:4px;margin-bottom:8px;}
.report-sub-btn{padding:10px 16px;font-family:'Press Start 2P',monospace;font-size:13px;background:var(--card-bg);border:2px solid var(--card-border);color:var(--text-faint);cursor:pointer;}
.report-sub-btn.active{background:rgba(244,208,63,0.2);border-color:var(--rich-soil);color:var(--rich-soil);}
.report-sub-btn:active{transform:translate(1px,1px);}
.clear-btn-row{display:flex;justify-content:flex-end;margin-bottom:8px;}
.report-entry{background:var(--card-bg);margin-bottom:6px;overflow:hidden;border:2px solid var(--card-border);}
.report-head{display:flex;align-items:center;gap:16px;padding:10px 20px;cursor:pointer;}
.report-result{font-family:'Press Start 2P',monospace;font-size:7px;}
.report-info{flex:1;}
.report-title{font-size:15px;color:var(--text);}
.report-time{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-faint);}
.report-expand{font-size:15px;color:var(--text-faint);transition:transform 0.2s;}
.report-expand.open{transform:rotate(180deg);}
.report-body{padding:0 16px;max-height:0;overflow:hidden;transition:max-height 0.3s ease,border-top-width 0.2s,padding 0.3s;border-top:0px solid var(--dark-tan);font-size:12px;color:var(--text-dim);}
.report-body.open{padding:12px 16px;max-height:500px;border-top-width:1px;}
.combat-log{padding:20px;display:flex;flex-direction:column;gap:6px;}
.log-line{font-size:12px;font-family:'Lora',serif;padding:3px 0;border-bottom:1px solid rgba(139,90,43,0.1);line-height:1.5;}
.log-line:last-child{border-bottom:none;}
.log-narrate{color:var(--rich-soil);font-weight:600;}
.log-round{color:var(--text-dim);}
.log-victory{color:#1e8449;font-weight:600;}
.log-defeat{color:#c0392b;font-weight:600;}
.log-drop{color:#8e44ad;font-weight:600;}
.log-heal{color:#16a085;}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--cream);border:2px solid var(--charcoal);padding:20px;max-width:340px;width:92%;max-height:85vh;overflow-y:auto;box-shadow:4px 4px 0 var(--charcoal);transform:translateY(20px);transition:transform 0.25s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-title{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--rich-soil);margin-bottom:14px;text-align:center;}
.modal-body{display:flex;flex-direction:column;gap:10px;}
.offline-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(139,90,43,0.1);}
.offline-label{font-size:15px;color:var(--text-dim);display:flex;align-items:center;gap:5px;}
.offline-val{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--rich-soil);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;gap:8px;}
.setting-label{font-size:13px;color:var(--text-dim);}
.slider{-webkit-appearance:none;appearance:none;width:110px;height:3px;background:rgba(139,90,43,0.2);outline:none;}
.slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--golden-wheat);cursor:pointer;border:2px solid var(--charcoal);}
.slider::-moz-range-thumb{width:14px;height:14px;background:var(--golden-wheat);cursor:pointer;border:2px solid var(--charcoal);border-radius:0;}
.toggle{width:36px;height:18px;background:rgba(139,90,43,0.2);position:relative;cursor:pointer;flex-shrink:0;}
.toggle.on{background:var(--green);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;background:var(--parchment);transition:transform 0.2s;}
.toggle.on::after{transform:translateX(18px);}

/* ── DISPATCH MODAL ── */
.dispatch-zone-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.dispatch-zone{background:var(--card-bg);border:2px solid var(--card-border);padding:8px;}
.dispatch-zone.locked{opacity:0.4;}
.dz-name{font-family:'Press Start 2P',monospace;font-size:13px;color:var(--text);margin-bottom:4px;}
.hero-pick-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card-bg);border:2px solid var(--card-border);margin-bottom:6px;font-size:13px;}
.hero-pick-row .hp-info{flex:1;min-width:0;}
.hero-pick-row .hp-name{font-weight:bold;color:var(--text);}
.hero-pick-row .hp-stats{color:var(--text-dim);font-size:11px;}

/* ── TOAST ── */
#toast-container{position:fixed;top:70px;right:12px;max-width:min(480px,90vw);z-index:400;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.toast{padding:8px 14px;font-family:'Press Start 2P',monospace;font-size:11px;box-shadow:2px 2px 0 var(--charcoal);animation:toastIn 0.3s ease forwards;opacity:0;border:2px solid var(--charcoal);}
.toast.show{opacity:1;}
.toast-success{background:var(--green);color:#fff;}
.toast-error{background:var(--red);color:#fff;}
.toast-info{background:var(--blue);color:#fff;}
@keyframes toastIn{from{transform:translateX(20px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes toastOut{from{opacity:1;}to{opacity:0;transform:translateX(20px);}}

/* ── DIVIDER / MISC ── */
.divider{height:2px;background:var(--dark-tan);margin:8px 0;}
.gallery-img{width:100%;border:2px solid var(--charcoal);box-shadow:2px 2px 0 var(--charcoal);margin-top:6px;display:block;image-rendering:auto;}
details.gallery summary{font-size:13px;color:var(--text-dim);cursor:pointer;padding:6px 0;}

@media(max-width:400px){
  .building-grid{grid-template-columns:1fr;}
  .shop-grid{grid-template-columns:1fr;}
}

/* ── REDUCED MOTION ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  .click-hint { animation: none; opacity: 0.8; }
}

// SAVE / LOAD (localStorage, key preserved: kingdomBuilderSave)
// ═══════════════════════════════════════════════════════════════════
const SAVE_KEY = 'kingdomBuilderSave';

function defaultZoneProgress() {
  const zp = {};
  for (const z of ZONES) zp[z.id] = { easy: false, normal: false, hard: false, bossDefeated: false };
  return zp;
}
function defaultMapProgress() {
  return { currentZone: 1, unlockedZones: [1], clearedZones: [], zoneProgress: defaultZoneProgress() };
}
function defaultBuildings() {
  const b = {};
  for (const id of BUILDING_ORDER) b[id] = { level: BUILDINGS[id].startLevel };
  return b;
}
function getDefaultGameState() {
  return {
    version: 2, lastOnline: Date.now(),
    resources: { gold: 500, magicStones: 0, fruitPoor: 0, waterDirty: 0, woodRotten: 0, ironRusty: 0, herbLow: 0 },
    heroes: [], wanderingHeroes: [],
    buildings: defaultBuildings(),
    mapProgress: defaultMapProgress(),
    shopInventory: {}, battleReports: [], activeExplorations: [],
    stats: { kills: 0, bossKills: 0, goldEarned: 0, clicks: 0, crafted: 0, prestiges: 0 },
    achievements: {}, prestige: { shards: 0, count: 0 },
    daily: { lastClaim: null, streak: 0, bestStreak: 0 },
    settings: { music: 40, sfx: 80, notif: true },
    nextWanderingSpawnIn: 0, potionShopAutoProduce: true,
  };
}

/** Fill in fields introduced after v1 so old saves keep working. */
function migrateSave(parsed) {
  const d = getDefaultGameState();
  if (!parsed || typeof parsed !== 'object') return d;
  parsed.version = 2;
  if (!parsed.stats) parsed.stats = d.stats;
  for (const k of Object.keys(d.stats)) if (parsed.stats[k] == null) parsed.stats[k] = d.stats[k];
  if (!parsed.achievements) parsed.achievements = {};
  if (!parsed.prestige) parsed.prestige = d.prestige;
  if (!parsed.daily) parsed.daily = d.daily;
  if (!parsed.settings) parsed.settings = d.settings;
  for (const k of Object.keys(d.settings)) if (parsed.settings[k] == null) parsed.settings[k] = d.settings[k];
  // New buildings added after v1 get their startLevel
  if (!parsed.buildings) parsed.buildings = {};
  for (const id of BUILDING_ORDER) {
    if (!parsed.buildings[id] || parsed.buildings[id].level == null) {
      parsed.buildings[id] = { level: BUILDINGS[id].startLevel };
    }
  }
  // Map progress: guarantee every zone has an entry
  if (!parsed.mapProgress || !parsed.mapProgress.zoneProgress) parsed.mapProgress = defaultMapProgress();
  else for (const z of ZONES) {
    if (!parsed.mapProgress.zoneProgress[z.id]) parsed.mapProgress.zoneProgress[z.id] = { easy: false, normal: false, hard: false, bossDefeated: false };
  }
  if (!parsed.mapProgress.unlockedZones) parsed.mapProgress.unlockedZones = [1];
  if (!parsed.mapProgress.clearedZones) parsed.mapProgress.clearedZones = [];
  // Heroes: guarantee fields used by newer systems
  for (const h of (parsed.heroes || [])) {
    if (h.xp == null) h.xp = 0;
    if (!h.inventory) h.inventory = [];
    if (!h.equipment) h.equipment = { weapon: null, armor: null };
    if (h.exploreDifficulty === undefined) h.exploreDifficulty = null;
    if (h.explorationProgress == null) h.explorationProgress = 0;
  }
  for (const h of (parsed.wanderingHeroes || [])) {
    if (!h.inventory) h.inventory = [];
    if (!h.equipment) h.equipment = { weapon: null, armor: null };
    if (h.wallet == null) h.wallet = 0;
    if (h.diamonds == null) h.diamonds = 0;
  }
  if (!parsed.shopInventory) parsed.shopInventory = {};
  if (!parsed.battleReports) parsed.battleReports = [];
  if (!parsed.activeExplorations) parsed.activeExplorations = [];
  return parsed;
}

function saveGame() {
  if (!gameState) return;
  try {
    gameState.lastOnline = Date.now();
    gameState.resources = ResourceSystem_getAll();
    gameState.heroes = territoryHeroes;
    gameState.wanderingHeroes = wanderingHeroes;
    gameState.buildings = {};
    for (const [id, state] of Object.entries(buildingStates)) gameState.buildings[id] = { level: state.level };
    gameState.mapProgress = mapProgress;
    gameState.shopInventory = shopInventory;
    gameState.potionShopAutoProduce = potionShopAutoProduce;
    gameState.nextWanderingSpawnIn = nextWanderingSpawnIn;
    gameState.battleReports = battleReports.slice(0, 50);
    gameState.activeExplorations = activeExplorations;
    gameState.stats = stats;
    gameState.achievements = achievementsUnlocked;
    gameState.prestige = prestige;
    gameState.daily = daily;
    gameState.settings = settings;
    localStorage.setItem(SAVE_KEY, JSON.stringify(gameState));
  } catch (e) { /* storage full or unavailable — ignore */ }
}

function loadGame() {
  let parsed = null;
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) parsed = JSON.parse(raw);
  } catch (e) { parsed = null; }
  gameState = migrateSave(parsed);
  return gameState;
}

// ═══════════════════════════════════════════════════════════════════
// RESOURCE SYSTEM
// ═══════════════════════════════════════════════════════════════════
function ResourceSystem_init(savedState) {
  resources = {};
  for (const [key, config] of Object.entries(RESOURCES)) {
    resources[key] = { value: savedState?.resources?.[key] ?? config.initial, capacity: config.capacity };
  }
}
function ResourceSystem_add(resourceId, amount) {
  if (!resources[resourceId]) return 0;
  const prev = resources[resourceId].value;
  const newValue = Math.min(prev + amount, RESOURCES[resourceId].capacity);
  resources[resourceId].value = newValue;
  return newValue - prev;
}
function ResourceSystem_subtract(resourceId, amount) {
  if (!resources[resourceId]) return false;
  if (resources[resourceId].value < amount) return false;
  resources[resourceId].value -= amount;
  return true;
}
function ResourceSystem_get(resourceId) { return resources[resourceId]?.value ?? 0; }
function ResourceSystem_getAll() { const r = {}; for (const [k, v] of Object.entries(resources)) r[k] = v.value; return r; }
function ResourceSystem_getCapacity(resourceId) { return resources[resourceId]?.capacity ?? 0; }
function ResourceSystem_getFillPercent(resourceId) { const s = resources[resourceId]; if (!s || s.capacity === 0) return 0; return (s.value / s.capacity) * 100; }
function ResourceSystem_canAfford(cost) { for (const [id, amt] of Object.entries(cost)) if (ResourceSystem_get(id) < amt) return false; return true; }
function ResourceSystem_spend(cost) { if (!ResourceSystem_canAfford(cost)) return false; for (const [id, amt] of Object.entries(cost)) ResourceSystem_subtract(id, amt); return true; }
/** Gold gained through gameplay — also tracked in lifetime stats. */
function gainGold(amount) {
  const added = ResourceSystem_add('gold', amount);
  if (added > 0) stats.goldEarned += added;
  return added;
}

// BONUS AGGREGATION (achievements + prestige + altar)
// ═══════════════════════════════════════════════════════════════════
function getAchievementBonuses() {
  const agg = { mat: 0, gold: 0, xp: 0, click: 0, atk: 0, def: 0 };
  for (const a of ACHIEVEMENTS) {
    if (!achievementsUnlocked[a.id]) continue;
    agg.mat += a.bonus.mat || 0;
    agg.gold += a.bonus.gold || 0;
    agg.xp += a.bonus.xp || 0;
    agg.click += a.bonus.click || 0;
    agg.atk += a.bonus.atk || 0;
    agg.def += a.bonus.def || 0;
  }
  return agg;
}

function BuildingSystem_init(savedState) {

function BuildingSystem_getLevel(id) { return buildingStates[id]?.level ?? 0; }
function BuildingSystem_getTotalLevels() { return Object.values(buildingStates).reduce((s, b) => s + b.level, 0); }
function getBuildingCost(buildingId, targetLevel) {

  const cost = {};

}
function BuildingSystem_upgrade(id) {

}
function BuildingSystem_getWanderingSpawnInterval() { return Math.max(2, 12 - (BuildingSystem_getLevel('tavern') * 2)); }

}
function buildingEffectText(id) {

  switch (id) {
    case 'monument': return '⚡ 各材料 +' + lvl + '~' + (3 * lvl) + '/秒';
    case 'goldMine': return lvl > 0 ? '🪙 +' + (lvl * 2) + ' 金幣/秒・點擊 +' + Math.floor(lvl / 2) : '🪙 建造後每秒產出金幣';
    case 'tavern': return '🛏 獵人空位 ' + BuildingSystem_getTerritoryHeroSlots() + '・訪客上限 ' + BuildingSystem_getMaxWanderingHeroes();
    case 'weaponShop': return '🗡 全獵人攻擊 +' + lvl + '・可製作 Lv.' + lvl + ' 級武器';
    case 'armorShop': return '🛡 全獵人防禦 +' + lvl + '・可製作 Lv.' + lvl + ' 級防具';

    case 'altar': return lvl > 0 ? '🔯 戰鬥金幣/經驗 +' + (lvl * 4) + '%' : '🔯 建造後提升戰鬥收益';

// HERO STATS (base + building passives + equipment + achievements)
// ═══════════════════════════════════════════════════════════════════
function getEquipBonuses(eq) {
  // Equipment instances store { id, name, icon, plus }; stats come from ITEMS by id,
  // so pre-fix saves with plain {id,name,icon} equipment automatically gain stats.
  const out = { atk: 0, def: 0, hp: 0, crit: 0, msFind: 0 };
  if (!eq || !eq.id) return out;
  const def = ITEMS[eq.id];
  const plus = eq.plus || 0;
  if (def) {
    out.atk += def.atk || 0;
    out.def += def.def || 0;
    out.hp += def.hp || 0;
    out.crit += def.crit || 0;
    out.msFind += def.msFind || 0;
  }
  if (def?.type === 'weapon') out.atk += plus * 2;
  if (def?.type === 'armor') { out.def += plus * 2; out.hp += plus * 10; }
  return out;
}
function getHeroTrait(hero) { return TRAITS.find(t => t.id === hero?.trait) || null; }
function getHeroStats(hero) {
  const cls = HERO_CLASSES[hero.class] || HERO_CLASSES.warrior;
  const lvl = hero.level || 1;
  let atk = hero.atk ?? (cls.baseAtk + (lvl - 1) * 3);
  let def = hero.def ?? (cls.baseDef + (lvl - 1) * 2);
  let maxHp = hero.maxHp ?? (cls.baseHp + (lvl - 1) * 10);
  let crit = 0.05, msFind = 0;
  atk += BuildingSystem_getLevel('weaponShop');
  def += BuildingSystem_getLevel('armorShop');
  const ach = getAchievementBonuses();
  atk += ach.atk; def += ach.def;
  for (const slot of ['weapon', 'armor']) {
    const b = getEquipBonuses(hero.equipment?.[slot]);
    atk += b.atk; def += b.def; maxHp += b.hp; crit += b.crit; msFind += b.msFind;
  }
  const st = { atk, def, maxHp, crit, msFind, goldMult: getCombatGoldMultiplier(), xpMult: getXpMultiplier() };
  // Star rank: 1~5 stars adjust the whole combat body (3 stars = baseline).
  const starMult = 1 + (((hero.stars || 3) - 3) * 0.08);
  st.atk = Math.max(1, Math.round(st.atk * starMult));
  st.def = Math.max(0, Math.round(st.def * starMult));
  st.maxHp = Math.max(1, Math.round(st.maxHp * starMult));
  // One innate hunter trait.
  const trait = getHeroTrait(hero);
  if (trait) trait.apply(st);
  // Fatigue: long hunts without rest lower combat performance.
  const fatigue = hero.fatigue || 0;
  if (fatigue >= 90) { st.atk = Math.max(1, Math.round(st.atk * 0.7)); st.def = Math.round(st.def * 0.7); }
  else if (fatigue >= 70) { st.atk = Math.max(1, Math.round(st.atk * 0.85)); st.def = Math.round(st.def * 0.85); }
  return st;
}

    id: uid(), name, class: classKey in HERO_CLASSES ? classKey : 'warrior', level,

}
function trainCost(hero) { return { gold: Math.round((80 + hero.level * 60) * (1 + (((hero.stars || 3) - 1) * 0.25))) }; }

}

function invCount(itemId) { return shopInventory[itemId] || 0; }

function itemStatsText(def) {

  if (def.def) parts.push(`防+${def.def}`);
  if (def.hp) parts.push(`HP+${def.hp}`);
  if (def.crit) parts.push(`暴擊+${Math.round(def.crit * 100)}%`);
  if (def.msFind) parts.push(`魔核+${Math.round(def.msFind * 100)}%`);

function addBattleReport(kind, title, result, lines, rewards) {

  if (battleReports.length > 100) battleReports.length = 100;
}
function calcDamage(atk, def, crit) {

}
function runCombat(hero, enemyTemplate, ctx) {

    rounds += 1;

      if (usePotion(hero, true)) lines.push(`🧪 ${hero.name} 喝下藥水，HP ${Math.max(0, Math.round(hero.hp))}/${st.maxHp}`);
    }
    const hit = calcDamage(st.atk, enemy.def || 0, st.crit);
    enemy.hp -= hit.dmg;
    lines.push(`第${rounds}回合：${hero.name} 造成 ${hit.dmg} 傷害${hit.isCrit ? '（暴擊！）' : ''}，${enemy.name} HP ${Math.max(0, enemy.hp)}`);
    if (enemy.hp <= 0) { won = true; break; }
    const ehit = calcDamage(enemy.atk || 1, st.def, 0.03);
    hero.hp -= ehit.dmg;
    lines.push(`${enemy.name} 反擊造成 ${ehit.dmg} 傷害，${hero.name} HP ${Math.max(0, Math.round(hero.hp))}/${st.maxHp}`);
  }

  if (won) {

    rewards.gold = Math.round(rand(ctx.goldRange[0], ctx.goldRange[1]) * st.goldMult);
    rewards.xp = Math.round((ctx.xp || 10) * st.xpMult);
    gainGold(rewards.gold);

    const msChance = (ctx.magicStoneChance || 0) + st.msFind;
    if (Math.random() < msChance) { rewards.magicStones = 1; ResourceSystem_add('magicStones', 1); }
    for (const dropId of (ctx.drops || [])) {
      if (Math.random() < 0.28 && addItem(dropId, 1)) rewards.drops.push(ITEMS[dropId].icon + ITEMS[dropId].name);
    }
    lines.push(`🏆 勝利！獲得 ${rewards.gold}🪙、${rewards.xp} XP${rewards.magicStones ? '、1💠' : ''}${rewards.drops.length ? '、掉落 ' + rewards.drops.join('、') : ''}`);
  } else {
    hero.hp = Math.max(1, Math.round(st.maxHp * 0.2));

}

function spawnWanderingHero() {
  if (wanderingHeroes.length >= BuildingSystem_getMaxWanderingHeroes()) return;
  const t = choice(WANDERING_HERO_TYPES);
  const hero = normalizeHero({ id: uid(), name: choice(HUNTER_NAMES), class: t.class, level: Math.max(1, t.level + rand(-1, 1)), status: 'wandering', wallet: t.dropGold, diamonds: 0, dropMagicStoneChance: t.dropMagicStoneChance });

function processWanderingTick() {

  for (let i = wanderingHeroes.length - 1; i >= 0; i--) {
    const h = wanderingHeroes[i]; const st = getHeroStats(h);
    if (Math.random() < BW_LEAVE_CHANCE) { wanderingHeroes.splice(i, 1); continue; }

      const dmg = rand(4, 10 + h.level * 2);
      h.hp = Math.max(1, h.hp - dmg);
      const gold = Math.round(rand(8, 18 + h.level * 4) * getCombatGoldMultiplier());

    } else if (roll < 0.7 && h.wallet >= 25) {

}

  for (const wx of [bx + 14, bx + 54, bx + 6, bx + 78]) c.fillRect(wx, by + (wx > bx + 50 ? 30 : 20), 6, 8);
  for (const fx of [bx - 18, bx + 100]) { c.fillStyle = '#4a3527'; c.fillRect(fx, by + 58, 4, 18); c.fillStyle = reduceMotion ? '#f4d03f' : (Math.random() < 0.5 ? '#f4d03f' : '#ff9f43'); c.fillRect(fx - 1, by + 53, 6, 6); }
  // workers / patrol dots
  for (let i = 0; i < 7; i++) {
    const x = (i * 31 + (reduceMotion ? 0 : t * (4 + i))) % (w - 20) + 10, y = 232 + (i % 3) * 26;
    c.fillStyle = ['#f4d03f', '#3498db', '#9b59b6'][i % 3]; c.fillRect(Math.round(x), y, 4, 5); c.fillStyle = '#3e2723'; c.fillRect(Math.round(x), y + 5, 4, 4);
  }
  // fireflies at night
  if (day < 0.35 && !reduceMotion) { c.fillStyle = 'rgba(244,208,63,0.8)'; for (let i = 0; i < 12; i++) { const x = (i * 47 + Math.sin(t + i) * 8 + w) % w, y = 150 + ((i * 37) % 140) + Math.cos(t * 1.7 + i) * 5; c.fillRect(Math.round(x), Math.round(y), 2, 2); } }
}
function hill(c, x, y, w, h) { c.beginPath(); c.moveTo(x, y + h); c.lineTo(x + w * 0.5, y); c.lineTo(x + w, y + h); c.closePath(); c.fill(); }
function mixColor(a, b, k) { return [Math.round(a[0] + (b[0] - a[0]) * k), Math.round(a[1] + (b[1] - a[1]) * k), Math.round(a[2] + (b[2] - a[2]) * k)]; }
function rgb(arr) { return `rgb(${arr[0]},${arr[1]},${arr[2]})`; }
function castleClick(e) {
  const amount = getClickGold();
  gainGold(amount); stats.clicks += 1;
  const rect = sceneCanvas.getBoundingClientRect();
  const x = e?.clientX ?? (rect.left + rect.width / 2), y = e?.clientY ?? (rect.top + rect.height * 0.45);
  spawnFloat(`🪙+${fmt(amount)}`, x, y, '#f4d03f');
  burst(x, y, '#f4d03f'); sfx('gold'); checkAchievements(); renderHUD();
}
function initFloatCanvas() {
  floatState.canvas = $('float-canvas'); floatState.ctx = floatState.canvas.getContext('2d');
  const resize = () => { floatState.canvas.width = window.innerWidth; floatState.canvas.height = window.innerHeight; };
  window.addEventListener('resize', resize); resize();
  const loop = () => {
    const c = floatState.ctx; c.clearRect(0, 0, floatState.canvas.width, floatState.canvas.height);
    for (let i = floatState.floats.length - 1; i >= 0; i--) {
      const f = floatState.floats[i]; f.life -= 1 / 60; f.y -= 0.7;
      if (f.life <= 0) { floatState.floats.splice(i, 1); continue; }
      c.globalAlpha = clamp(f.life, 0, 1); c.font = '12px "Press Start 2P", monospace'; c.fillStyle = f.color; c.strokeStyle = '#2c2c2c'; c.lineWidth = 3; c.strokeText(f.text, f.x, f.y); c.fillText(f.text, f.x, f.y);
    }
    c.globalAlpha = 1;
    for (let i = floatState.particles.length - 1; i >= 0; i--) {
      const p = floatState.particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= 1 / 45;
      if (p.life <= 0) { floatState.particles.splice(i, 1); continue; }
      c.globalAlpha = clamp(p.life, 0, 1); c.fillStyle = p.color; c.fillRect(p.x, p.y, p.size, p.size);
    }
    c.globalAlpha = 1; requestAnimationFrame(loop);
  };
  requestAnimationFrame(loop);
}
function spawnFloat(text, x, y, color = '#f4d03f') { floatState.floats.push({ text, x, y, color, life: 1.2 }); }
function burst(x, y, color) { for (let i = 0; i < 12; i++) floatState.particles.push({ x, y, vx: randf(-2.4, 2.4), vy: randf(-3.4, -0.6), size: rand(2, 4), color, life: randf(0.5, 1) }); }

function gameTick() {
  produceTick();
  processHeroTick();
  processWanderingTick();
  territoryCombatTickCounter += 1;
  checkAchievements();
  renderHUD(); renderBadges();
  // Panels re-render on actions immediately; on the tick only refresh periodically
  // so open panels do not reset scroll while the player is reading.
  if (activePanel && (territoryCombatTickCounter % 5 === 0 || (activePanel === 'map' && territoryCombatTickCounter % 2 === 0))) {
    renderPanel(activePanel);
  }
}
function applyStateToRuntime() {
  ResourceSystem_init(gameState);
  BuildingSystem_init(gameState);
  territoryHeroes = (gameState.heroes || []).map(normalizeHero);
  wanderingHeroes = (gameState.wanderingHeroes || []).map(normalizeHero);
  shopInventory = gameState.shopInventory || {};
  potionShopAutoProduce = gameState.potionShopAutoProduce !== false;
  nextWanderingSpawnIn = gameState.nextWanderingSpawnIn || 3;
  mapProgress = gameState.mapProgress || defaultMapProgress();
  activeExplorations = gameState.activeExplorations || [];
  battleReports = gameState.battleReports || [];
  stats = gameState.stats || stats;
  achievementsUnlocked = gameState.achievements || {};
  prestige = gameState.prestige || { shards: 0, count: 0 };
  daily = gameState.daily || { lastClaim: null, streak: 0, bestStreak: 0 };
  settings = gameState.settings || { music: 40, sfx: 80, notif: true };
  syncActiveExplorations();
  if (territoryHeroes.length === 0) territoryHeroes.push(generateHero('warrior', 1, 'Ray'));
}
function init() {
  loadGame();
  applyStateToRuntime();
  bindSettings();
  initScene();
  initFloatCanvas();
  // Offline progress (50% efficiency, capped at 8h), shown without crashing.
  const elapsed = Math.floor((Date.now() - (gameState.lastOnline || Date.now())) / 1000);
  if (elapsed > 60) {
    const capped = Math.min(elapsed, 8 * 3600);
    pendingOfflineSummary = { seconds: capped, gains: computeOffline(capped) };
    $('modal-welcome-body').innerHTML = offlineModalHtml(pendingOfflineSummary.gains, capped);
    showModal('modal-welcome');
  }
  checkDaily();
  checkAchievements();
  renderAll();
  setInterval(gameTick, 1000);
  setInterval(saveGame, 10000);
  window.addEventListener('pagehide', saveGame);
  document.addEventListener('visibilitychange', () => { if (document.hidden) saveGame(); });
  window.addEventListener('pointerdown', ensureAudio, { once: true });
  registerSW();
}
init();
</script>
</div>
