<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Idle Kingdom Builder — 瀏覽器閒置王國建設遊戲">
  <meta name="theme-color" content="#1a1a2e">
  <title>Idle Kingdom Builder</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- HUD — Top Status Bar                                              -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <header id="hud">
    <div class="hud-left">
      <span id="kingdom-name">My Kingdom</span>
      <div id="resource-gold" class="resource-item" data-resource="gold">
        <span class="resource-icon">🪙</span>
        <span class="resource-value" id="gold-value">500</span>
        <span class="resource-max">/ <span id="gold-max">10,000</span></span>
      </div>
      <div id="resource-magicStones" class="resource-item" data-resource="magicStones">
        <span class="resource-icon">💎</span>
        <span class="resource-value" id="magicStones-value">0</span>
      </div>
    </div>

    <div class="hud-center">
      <div id="material-icons">
        <!-- Material icons injected by JS -->
      </div>
    </div>

    <div class="hud-right">
      <button id="btn-settings" class="hud-btn" title="Settings">⚙️</button>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Main Game Canvas                                                  -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <main id="game-canvas-container">
    <canvas id="game-canvas"></canvas>
    <div id="floating-numbers"></div>
  </main>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Bottom Navigation                                                  -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <nav id="bottom-nav">
    <button class="nav-btn" data-panel="resources">
      <span class="nav-icon">📦</span>
      <span class="nav-label">資源</span>
    </button>
    <button class="nav-btn" data-panel="heroes">
      <span class="nav-icon">⚔️</span>
      <span class="nav-label">英雄</span>
    </button>
    <button class="nav-btn" data-panel="building">
      <span class="nav-icon">🏰</span>
      <span class="nav-label">建築</span>
    </button>
    <button class="nav-btn" data-panel="map">
      <span class="nav-icon">🗺️</span>
      <span class="nav-label">地圖</span>
    </button>
    <button class="nav-btn" data-panel="shop">
      <span class="nav-icon">🛒</span>
      <span class="nav-label">商店</span>
    </button>
  </nav>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Panel Container                                                    -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <div id="panel-container">
    <!-- Resource Panel -->
    <div id="panel-resources" class="panel hidden">
      <div class="panel-header">
        <h2>Resources</h2>
        <button class="btn-close panel-close" data-panel="resources">×</button>
      </div>
      <div class="panel-content" id="resources-panel-content">
        <!-- Injected by JS -->
      </div>
    </div>

    <!-- Hero Panel -->
    <div id="panel-heroes" class="panel hidden">
      <div class="panel-header">
        <h2>Heroes</h2>
        <button class="btn-close panel-close" data-panel="heroes">×</button>
      </div>
      <div class="panel-content" id="heroes-panel-content">
        <!-- Injected by JS -->
      </div>
    </div>

    <!-- Building Panel -->
    <div id="panel-building" class="panel hidden">
      <div class="panel-header">
        <h2>Buildings</h2>
        <button class="btn-close panel-close" data-panel="building">×</button>
      </div>
      <div class="panel-content" id="building-panel-content">
        <!-- Injected by JS -->
      </div>
    </div>

    <!-- Map Panel -->
    <div id="panel-map" class="panel hidden">
      <div class="panel-header">
        <h2>Exploration</h2>
        <button class="btn-close panel-close" data-panel="map">×</button>
      </div>
      <div class="panel-content" id="map-panel-content">
        <!-- Injected by JS -->
      </div>
    </div>

    <!-- Shop Panel -->
    <div id="panel-shop" class="panel hidden">
      <div class="panel-header">
        <h2>Shop</h2>
        <button class="btn-close panel-close" data-panel="shop">×</button>
      </div>
      <div class="panel-content" id="shop-panel-content">
        <!-- Injected by JS -->
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Welcome Back Modal                                                -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <div id="welcome-back-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Welcome Back!</h2>
      <p>You were away for: <span id="offline-time">0h 0m</span></p>
      <div id="offline-earnings">
        <p>While you were gone:</p>
        <ul id="earnings-list"></ul>
      </div>
      <button id="collect-offline" class="btn-primary">Collect</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Settings Modal                                                    -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button id="close-settings" class="btn-close">×</button>
      </div>
      <div class="modal-body">
        <div class="setting-row">
          <label for="setting-music">Music Volume</label>
          <input type="range" id="setting-music" min="0" max="100" value="50">
        </div>
        <div class="setting-row">
          <label for="setting-sfx">SFX Volume</label>
          <input type="range" id="setting-sfx" min="0" max="100" value="70">
        </div>
        <div class="setting-row">
          <label>
            <input type="checkbox" id="setting-notifications" checked>
            Enable Notifications
          </label>
        </div>
        <hr>
        <div class="setting-actions">
          <button id="btn-save-game" class="btn-secondary">💾 Save Game</button>
          <button id="btn-new-game" class="btn-danger">🆕 New Game</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Toast Container                                                   -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <div id="toast-container"></div>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Scripts (order matters!)                                         -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <script src="js/data/gameData.js"></script>
  <script src="js/data/saveManager.js"></script>
  <script src="js/systems/resourceSystem.js"></script>
  <script src="js/systems/buildingSystem.js"></script>
  <script src="js/systems/heroSystem.js"></script>
  <script src="js/systems/shopSystem.js"></script>
  <script src="js/systems/mapSystem.js"></script>
  <script src="js/systems/offlineSystem.js"></script>
  <script src="js/ui/canvasRenderer.js"></script>
  <script src="js/main.js"></script>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- UI Controller                                                     -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <script>
    /**
     * UI Controller — handles DOM updates and user interactions
     * Depends on: Game, ResourceSystem, HeroSystem, GameData
     */
    const UIController = (function () {
      // ─── DOM References ───────────────────────────────────────────────
      const elements = {
        goldValue: document.getElementById('gold-value'),
        goldMax: document.getElementById('gold-max'),
        magicStonesValue: document.getElementById('magicStones-value'),
        materialIcons: document.getElementById('material-icons'),
        toastContainer: document.getElementById('toast-container'),
        panelContainer: document.getElementById('panel-container'),
        welcomeBackModal: document.getElementById('welcome-back-modal'),
        settingsModal: document.getElementById('settings-modal'),
        floatingNumbers: document.getElementById('floating-numbers'),
      };

      // ─── Initialization ───────────────────────────────────────────────

      function init() {
        // Set up material icons
        createMaterialIcons();

        // Set up nav button listeners
        setupNavigation();

        // Set up settings modal
        setupSettings();

        // Set up game event listeners
        setupGameListeners();

        // Initial UI update
        updateAllResources();
      }

      function createMaterialIcons() {
        const materials = ResourceSystem.getMaterialTypes();
        elements.materialIcons.innerHTML = materials.map(mat => {
          const config = ResourceSystem.getConfig(mat);
          return `
            <div class="material-icon" data-resource="${mat}" title="${config.name}">
              <span class="resource-icon">${config.icon}</span>
              <span class="resource-value" id="${mat}-value">0</span>
            </div>
          `;
        }).join('');
      }

      // ─── Navigation ───────────────────────────────────────────────────

      let currentPanel = null;

      function setupNavigation() {
        document.querySelectorAll('.nav-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const panel = btn.dataset.panel;
            openPanel(panel);
          });
        });

        // Panel close buttons
        document.querySelectorAll('.panel-close').forEach(btn => {
          btn.addEventListener('click', () => {
            closePanel();
          });
        });
      }

      function openPanel(panelName) {
        // Close current panel if open
        closePanel();

        // Open the requested panel
        const panel = document.getElementById(`panel-${panelName}`);
        if (!panel) {
          console.warn(`[UI] Panel not found: ${panelName}`);
          return;
        }

        panel.classList.remove('hidden');
        elements.panelContainer.classList.add('open');
        currentPanel = panelName;

        // Render panel content
        renderPanelContent(panelName);
      }

      function closePanel() {
        if (currentPanel) {
          const panel = document.getElementById(`panel-${currentPanel}`);
          if (panel) {
            panel.classList.add('hidden');
          }
        }
        elements.panelContainer.classList.remove('open');
        currentPanel = null;
      }

      function renderPanelContent(panelName) {
        const contentId = `${panelName}-panel-content`;
        const content = document.getElementById(contentId);
        if (!content) return;

        switch (panelName) {
          case 'resources':
            renderResourcesPanel(content);
            break;
          case 'heroes':
            renderHeroesPanel(content);
            break;
          case 'building':
            renderBuildingPanel(content);
            break;
          case 'map':
            renderMapPanel(content);
            break;
          case 'shop':
            renderShopPanel(content);
            break;
        }
      }

      // ─── Panel Renderers ───────────────────────────────────────────────

      function renderResourcesPanel(content) {
        const resources = [
          { id: 'gold', config: ResourceSystem.getConfig('gold') },
          { id: 'magicStones', config: ResourceSystem.getConfig('magicStones') },
          ...ResourceSystem.getMaterialTypes().map(id => ({
            id,
            config: ResourceSystem.getConfig(id)
          }))
        ];

        content.innerHTML = resources.map(r => `
          <div class="resource-detail" data-resource="${r.id}">
            <div class="resource-detail-header">
              <span class="resource-icon">${r.config.icon}</span>
              <span class="resource-name">${r.config.name}</span>
            </div>
            <div class="resource-detail-values">
              <span class="resource-current">${formatNumber(ResourceSystem.get(r.id))}</span>
              <span class="resource-separator">/</span>
              <span class="resource-max">${formatNumber(ResourceSystem.getCapacity(r.id))}</span>
            </div>
            <div class="resource-bar">
              <div class="resource-bar-fill" style="width: ${ResourceSystem.getFillPercent(r.id)}%"></div>
            </div>
          </div>
        `).join('');

        // Add CSS for resource details
        addResourceDetailStyles();
      }

      function renderHeroesPanel(content) {
        content.innerHTML = `
          <div class="hero-sub-tabs">
            <button class="hero-sub-tab active" data-tab="heroes">⚔️ Heroes</button>
            <button class="hero-sub-tab" data-tab="reports">📜 Battle Reports</button>
          </div>
          <div id="hero-tab-content">
            <!-- populated by tab switch -->
          </div>
        `;

        const tabContent = content.querySelector('#hero-tab-content');

        function switchHeroTab(tab) {
          content.querySelectorAll('.hero-sub-tab').forEach(t => t.classList.remove('active'));
          content.querySelector(`[data-tab="${tab}"]`).classList.add('active');
          if (tab === 'heroes') renderHeroesTab(tabContent);
          else renderReportsTab(tabContent);
        }

        content.querySelectorAll('.hero-sub-tab').forEach(btn => {
          btn.addEventListener('click', () => switchHeroTab(btn.dataset.tab));
        });

        // Default to heroes tab
        switchHeroTab('heroes');
      }

      function renderHeroesTab(content) {
        const territory = HeroSystem.getTerritoryHeroes();
        const wandering = HeroSystem.getWanderingHeroes();
        const slots = BuildingSystem.getTerritoryHeroSlots();
        const castleLevel = BuildingSystem.getLevel('castle');
        const tavernLevel = BuildingSystem.getLevel('tavern');
        const maxWandering = BuildingSystem.getMaxWanderingHeroes();

        content.innerHTML = `
          <div class="panel-section">
            <h3>⚔️ Territory Heroes (${slots.current}/${slots.max})</h3>
            <div class="tavern-info">🏰 Castle Lv.${castleLevel} — ${slots.max - slots.current} slots free</div>
            ${territory.length === 0 ? '<p class="empty-state">No heroes yet! Recruit from wandering visitors.</p>' : ''}
            ${territory.map(hero => `
              <div class="hero-card territory ${hero.status}">
                <div class="hero-portrait">${getHeroIcon(hero.class)}</div>
                <div class="hero-info-block">
                  <div class="hero-name">${hero.name}</div>
                  <div class="hero-class">Lv.${hero.level} ${hero.class}</div>
                  <div class="hero-stats-row">
                    <span>HP: ${hero.hp}/${hero.maxHp}</span>
                    <span>ATK: ${hero.atk}</span>
                    <span>DEF: ${hero.def}</span>
                  </div>
                  <div class="hero-status-row">
                    <span class="hero-status-badge status-${hero.status}">${hero.status === 'resting' ? '💤 resting' : hero.status}</span>
                    ${hero.status === 'exploring' ? `<span class="explore-zone-label">🔍 Zone ${hero.currentZone || ''}</span>` : ''}
                    ${hero.status === 'resting' ? `<span class="resting-heal-hint">+${Math.ceil(hero.maxHp * 0.001)} HP/tick</span>` : ''}
                  </div>
                </div>
                <div class="hero-actions">
                  ${hero.status === 'idle' ? `<button class="btn-small btn-dispatch" data-hero="${hero.id}">Dispatch</button>` : ''}
                  ${hero.status === 'idle' ? `<button class="btn-small btn-train" data-hero="${hero.id}">Train</button>` : ''}
                  ${hero.status === 'exploring' ? `<button class="btn-small btn-cancel" data-hero="${hero.id}">Recall</button>` : ''}
                  ${hero.status === 'resting' ? `<span class="resting-label">💤 Recovering...</span>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
          <div class="panel-section">
            <h3>👥 Wandering Heroes (${wandering.length}/${BuildingSystem.getMaxWanderingHeroes()})</h3>
            ${wandering.length === 0 ? '<p class="empty-state">No visitors right now.</p>' : ''}
            ${wandering.map(hero => {
              const cost = HeroSystem.getRecruitCost(hero.id);
              const canRecruit = ResourceSystem.get('gold') >= cost && slots.current < slots.max;
              return `
              <div class="hero-card wandering ${hero.status}">
                <div class="hero-portrait">${getHeroIcon(hero.class)}</div>
                <div class="hero-info-block">
                  <div class="hero-name">${hero.name}</div>
                  <div class="hero-class">Lv.${hero.level} ${hero.class}</div>
                  <div class="hero-stats-row">
                    <span>HP: ${hero.hp}/${hero.maxHp}</span>
                    <span>ATK: ${hero.atk}</span>
                    <span>DEF: ${hero.def}</span>
                  </div>
                  <div class="hero-status-row">
                    <span class="hero-status-badge status-${hero.status}">${hero.status}</span>
                  </div>
                </div>
                <div class="hero-actions">
                  <button class="btn-small btn-recruit ${canRecruit ? '' : 'disabled'}"
                    data-hero="${hero.id}"
                    data-cost="${cost}"
                    ${canRecruit ? '' : 'disabled'}>
                    🏠 Recruit (${cost}g)
                  </button>
                </div>
              </div>
            `;}).join('')}
          </div>
        `;

        // Dispatch button — open zone selector
        content.querySelectorAll('.btn-dispatch').forEach(btn => {
          btn.addEventListener('click', () => {
            const heroId = btn.dataset.hero;
            showDispatchModal(heroId);
          });
        });

        // Cancel/Recall button
        content.querySelectorAll('.btn-cancel').forEach(btn => {
          btn.addEventListener('click', () => {
            const heroId = btn.dataset.hero;
            HeroSystem.returnToIdle(heroId);
            renderHeroesTab(content);
          });
        });

        // Wake button (for resting heroes)
        content.querySelectorAll('.btn-wake').forEach(btn => {
          btn.addEventListener('click', () => {
            const heroId = btn.dataset.hero;
            HeroSystem.wakeFromResting(heroId);
            renderHeroesTab(content);
          });
        });

        // Train button
        content.querySelectorAll('.btn-train').forEach(btn => {
          btn.addEventListener('click', () => {
            const heroId = btn.dataset.hero;
            const hero = HeroSystem.getTerritoryHero(heroId);
            if (!hero) return;
            const cost = hero.level * 150;
            if (ResourceSystem.spend({ gold: cost })) {
              HeroSystem.trainHero(heroId, { gold: cost });
              showToast('Hero trained!');
              renderHeroesTab(content);
            } else {
              showToast('Not enough gold!');
            }
          });
        });

        // Recruit button
        content.querySelectorAll('.btn-recruit:not(.disabled)').forEach(btn => {
          btn.addEventListener('click', () => {
            const heroId = btn.dataset.hero;
            if (HeroSystem.recruitWanderingHero(heroId)) {
              showToast('Hero recruited!');
              renderHeroesTab(content);
            }
          });
        });

        addHeroPanelStyles();
      }

      function showDispatchModal(heroId) {
        const hero = HeroSystem.getTerritoryHero(heroId);
        if (!hero) return;
        const zones = MapSystem.getZones();
        const unlocked = MapSystem.getUnlockedZones().map(z => z.id);

        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.id = 'dispatch-modal';
        modal.innerHTML = `
          <div class="modal-content">
            <div class="modal-header">
              <h2>Dispatch ${hero.name}</h2>
              <button class="btn-close dispatch-close">×</button>
            </div>
            <div class="dispatch-zones">
              ${zones.map(zone => {
                const isUnlocked = unlocked.includes(zone.id);
                const difficulty = '★'.repeat(zone.difficulty) + '☆'.repeat(5 - zone.difficulty);
                return `
                <div class="dispatch-zone ${!isUnlocked ? 'locked' : ''}" ${isUnlocked ? `data-zone="${zone.id}" data-hero="${heroId}"` : ''}>
                  <div class="zone-name">${zone.name}</div>
                  <div class="zone-difficulty">${difficulty}</div>
                  <div class="zone-req">Rec. Lv.${zone.recommendedLevel}+</div>
                  ${!isUnlocked ? '<div class="zone-locked">🔒 Locked</div>' : ''}
                </div>
              `;}).join('')}
            </div>
          </div>
        `;
        document.body.appendChild(modal);

        modal.querySelector('.dispatch-close').addEventListener('click', () => modal.remove());
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });

        modal.querySelectorAll('.dispatch-zone:not(.locked)').forEach(z => {
          z.addEventListener('click', () => {
            const zoneId = parseInt(z.dataset.zone);
            const heroId = z.dataset.hero;
            MapSystem.startExploration(heroId, zoneId);
            modal.remove();
            renderHeroesTab(document.querySelector('#hero-tab-content'));
          });
        });
      }

      function renderReportsTab(content) {
        const wandReports = HeroSystem.getCombatReports('wandering');
        const terrReports = HeroSystem.getCombatReports('territory');

        content.innerHTML = `
          <div class="panel-section">
            <div class="reports-header">
              <h3>📜 Battle Reports</h3>
              <button class="btn-small btn-clear-reports">Clear All</button>
            </div>
            <div class="report-subtabs">
              <button class="btn-small report-subtab active" data-type="wandering">👥 Wandering (${wandReports.length})</button>
              <button class="btn-small report-subtab" data-type="territory">⚔️ Territory (${terrReports.length})</button>
            </div>
          </div>
          <div class="panel-section">
            <div id="report-list-container"></div>
          </div>
        `;

        content.querySelectorAll('.btn-clear-reports').forEach(btn => {
          btn.addEventListener('click', () => {
            HeroSystem.clearCombatReports();
            renderReportsTab(content);
          });
        });

        // Sub-tab switching
        content.querySelectorAll('.report-subtab').forEach(btn => {
          btn.addEventListener('click', () => {
            content.querySelectorAll('.report-subtab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderReportList(content, btn.dataset.type);
          });
        });

        // Initial render with wandering
        renderReportList(content, 'wandering');

        function renderReportList(type) {
          const container = content.querySelector('#report-list-container');
          const reports = type === 'wandering' ? wandReports : terrReports;
          if (reports.length === 0) {
            container.innerHTML = `<p class="empty-state">No ${type} hero battle reports.</p>`;
            return;
          }
          container.innerHTML = `<div class="report-list">${reports.slice().reverse().map(r => buildReportEntry(r, type)).join('')}</div>`;
          attachReportListeners(container);
        }
      }

      function attachReportListeners(container) {
        container.querySelectorAll('.report-entry').forEach(entry => {
          entry.addEventListener('click', () => {
            const wasExpanded = entry.classList.contains('expanded');
            container.querySelectorAll('.report-entry').forEach(e => e.classList.remove('expanded'));
            if (!wasExpanded) {
              entry.classList.add('expanded');
            }
          });
        });
      }

      function buildReportEntry(report, type) {
        const icon = report.victory ? '🏆' : '💨';
        const typeLabel = type === 'wandering' ? 'Wandering' : report.zoneName;
        const time = new Date(report.timestamp).toLocaleTimeString();
        const preview = report.combatLog?.find(e => e.type === 'result')?.text || '';
        return `
          <div class="report-entry" data-id="${report.id}">
            <div class="report-summary">
              <span class="report-icon">${icon}</span>
              <span class="report-hero">${report.heroName} (Lv.${report.heroLevel})</span>
              <span class="report-zone">${typeLabel}</span>
              <span class="report-time">${time}</span>
            </div>
            <div class="report-log">
              ${report.combatLog.map(e => `<div class="combat-entry ${e.type}">${e.text}</div>`).join('')}
            </div>
          </div>
        `;
      }

      function renderBuildingPanel(content) {
        const buildings = BuildingSystem.getAll();
        const tavernSlots = BuildingSystem.getTerritoryHeroSlots();
        const spawnInterval = BuildingSystem.getWanderingSpawnInterval();
        const maxWandering = BuildingSystem.getMaxWanderingHeroes();

        content.innerHTML = Object.values(buildings).map(b => {
          return `
            <div class="building-card ${b.id === 'tavern' ? 'tavern-card' : ''}">
              <div class="building-header">
                <span class="building-name">${b.name}</span>
                <span class="building-level">Lv.${b.level}</span>
              </div>
              <div class="building-desc">${b.description}</div>
              ${b.id === 'tavern' ? `
                <div class="tavern-stats">
                  <div>⚔️ Combat heroes: ${tavernSlots.current}/${tavernSlots.max}</div>

      function renderMapPanel(content) {
        const zones = MapSystem.getZones();
        const unlocked = MapSystem.getUnlockedZones().map(z => z.id);
        const cleared = MapSystem.getProgress().clearedZones;
        const activeExplorations = MapSystem.getActiveExplorations();

        content.innerHTML = `
          <div class="panel-section">
            <h3>Active Explorations</h3>
            ${activeExplorations.length === 0 ? '<p class="empty-state">No active explorations.</p>' : ''}
            ${activeExplorations.map(exp => `
              <div class="exploration-card">
                <div class="exp-hero">${exp.zoneName}</div>
                <div class="exp-progress">
                  <div class="exp-progress-bar" style="width: ${exp.progress}%"></div>
                </div>
                <div class="exp-percent">${Math.floor(exp.progress)}%</div>
              </div>
            `).join('')}
          </div>
          <div class="panel-section">
            <h3>Zones</h3>
            ${zones.map(zone => {
              const isUnlocked = unlocked.includes(zone.id);
              const isCleared = cleared.includes(zone.id);
              const difficulty = '★'.repeat(zone.difficulty) + '☆'.repeat(5 - zone.difficulty);

              return `
                <div class="zone-card ${!isUnlocked ? 'locked' : ''} ${isCleared ? 'cleared' : ''}">
                  <div class="zone-header">
                    <span class="zone-name">${zone.name}</span>
                    ${isCleared ? '<span class="zone-badge cleared">✓ Cleared</span>' : ''}
                    ${!isUnlocked ? '<span class="zone-badge locked">🔒 Locked</span>' : ''}
                  </div>
                  <div class="zone-difficulty">${difficulty}</div>
                  <div class="zone-info">
                    <span>Recommended: Lv.${zone.recommendedLevel}+</span>
                  </div>
                  ${isUnlocked && !isCleared ? `
                    <button class="btn-explore-zone" data-zone="${zone.id}">Explore</button>
                  ` : ''}
                </div>
              `;
            }).join('')}
          </div>
        `;

        addMapPanelStyles();

        // Wire up explore buttons
        content.querySelectorAll('.btn-explore-zone').forEach(btn => {
          btn.addEventListener('click', () => {
            const zoneId = parseInt(btn.dataset.zone);
            // For now, find first idle territory hero to dispatch
            const heroes = HeroSystem.getTerritoryHeroes();
            const idleHero = heroes.find(h => h.status === 'idle');
            if (idleHero) {
              MapSystem.startExploration(idleHero.id, zoneId);
              showToast(`Dispatched ${idleHero.name} to explore!`);
              renderMapPanel(content);
            } else {
              showToast('No idle heroes available', 'error');
            }
          });
        });
      }

      // ─── Game Event Listeners ─────────────────────────────────────────

      function setupGameListeners() {
        // Resource changes
        ResourceSystem.addListener((event, data) => {
          if (event === 'add' || event === 'subtract') {
            updateResourceDisplay(data.resourceId);
            if (event === 'add' && data.amount > 0) {
              showFloatingNumber(data.resourceId, '+' + data.amount);
            }
          }
        });

        // Game tick — periodic UI refresh
        document.addEventListener('game_tick', () => {
          updateAllResources();
        });

        // Welcome back
        document.addEventListener('game_welcome_back', (e) => {
          showWelcomeBack(e.detail);
        });

        // Game saved notification
        document.addEventListener('game_saved', (e) => {
          if (e.detail.manual) return; // Manual save shows toast already
          // Silent save indicator could go here
        });

        // Hero combat results — reports are stored in HeroSystem, UI picks them up from tab
        HeroSystem.addListener((event, data) => {
          if (event === 'wandering_combat_result' || event === 'exploration_combat_result') {
            // Reports auto-update in Battle Reports tab when user switches to it
            // No modal needed — tabbed UI handles it
          }
        });
      }

      // ─── Resource Display ─────────────────────────────────────────────

      function updateAllResources() {
        updateResourceDisplay('gold');
        updateResourceDisplay('magicStones');
        ResourceSystem.getMaterialTypes().forEach(mat => {
          updateResourceDisplay(mat);
        });
      }

      function updateResourceDisplay(resourceId) {
        const value = ResourceSystem.get(resourceId);
        const capacity = ResourceSystem.getCapacity(resourceId);
        const element = document.getElementById(`${resourceId}-value`);
        const maxElement = document.getElementById(`${resourceId}-max`);

        if (element) {
          element.textContent = formatNumber(value);
        }
        if (maxElement) {
          maxElement.textContent = formatNumber(capacity);
        }

        // Capacity warning
        const fillPercent = ResourceSystem.getFillPercent(resourceId);
        const container = document.querySelector(`[data-resource="${resourceId}"]`);
        if (container) {
          container.classList.remove('warning', 'critical');
          if (fillPercent >= 90) container.classList.add('critical');
          else if (fillPercent >= 80) container.classList.add('warning');
        }
      }

      // ─── Toasts ───────────────────────────────────────────────────────

      function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        elements.toastContainer.appendChild(toast);

        setTimeout(() => {
          toast.classList.add('toast-fade');
          setTimeout(() => toast.remove(), 300);
        }, 2000);
      }

      // ─── Floating Numbers ─────────────────────────────────────────────

      function showFloatingNumber(resourceId, text) {
        const config = ResourceSystem.getConfig(resourceId);
        const container = elements.floatingNumbers;

        const floater = document.createElement('div');
        floater.className = 'floating-number';
        floater.textContent = `${config.icon} ${text}`;
        floater.style.left = Math.random() * 200 + 100 + 'px';
        floater.style.top = Math.random() * 100 + 50 + 'px';

        container.appendChild(floater);

        setTimeout(() => {
          floater.classList.add('float-up');
          setTimeout(() => floater.remove(), 1000);
        }, 50);
      }

      // ─── Welcome Back Modal ────────────────────────────────────────────

      function showWelcomeBack(data) {
        const hours = Math.floor(data.cappedSeconds / 3600);
        const minutes = Math.floor((data.cappedSeconds % 3600) / 60);

        document.getElementById('offline-time').textContent = `${hours}h ${minutes}m`;

        const list = document.getElementById('earnings-list');
        list.innerHTML = '';

        if (data.goldProduced > 0) {
          list.innerHTML += `<li>🪙 +${formatNumber(data.goldProduced)} Gold</li>`;
        }

        for (const [mat, amount] of Object.entries(data.materialsProduced)) {
          if (amount > 0) {
            const config = ResourceSystem.getConfig(mat);
            if (config) {
              list.innerHTML += `<li>${config.icon} +${formatNumber(amount)} ${config.name}</li>`;
            }
          }
        }

        if (data.magicStonesProduced > 0) {
          list.innerHTML += `<li>💎 +${formatNumber(data.magicStonesProduced)} Magic Stones</li>`;
        }

        if (data.isCapped) {
          list.innerHTML += `<li class="note">⏰ (8h cap applied)</li>`;
        }

        elements.welcomeBackModal.classList.remove('hidden');

        document.getElementById('collect-offline').onclick = () => {
          elements.welcomeBackModal.classList.add('hidden');
          showToast('Resources collected!', 'success');
        };
      }

      // ─── Utilities ─────────────────────────────────────────────────────

      function formatNumber(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num.toString();
      }

      // ─── Public API ────────────────────────────────────────────────────

      return {
        init,
        showToast,
        updateAllResources,
      };
    })();

    // Initialize UI after Game systems are ready
    function initUI() {
      console.log('[UI] Initializing UI...');
      try {
        UIController.init();
        console.log('[UI] UIController.init() complete');
      } catch (err) {
        console.error('[UI] UIController.init() failed:', err);
      }
    }

    // Wait for Game.init() to complete via event, then init UI
    document.addEventListener('game_ready', () => {
      console.log('[UI] game_ready event received');
      initUI();
    });

    // Fallback: if game_ready doesn't fire within 3 seconds, init anyway
    setTimeout(() => {
      console.warn('[UI] game_ready timeout - forcing init');
      initUI();
    }, 3000);
  </script>
</body>
</html>
